<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireSight — Strategy Debug</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0D11; color: #D4DAE3;
    font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    height: 100vh; display: flex; flex-direction: column;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

  .header {
    padding: 10px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.live { background: #22C55E; box-shadow: 0 0 8px #22C55E; }
  .dot.dead { background: #EF4444; box-shadow: 0 0 8px #EF4444; }

  .main { display: flex; flex: 1; overflow: hidden; }
  .left { flex: 1; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.06); }
  .right { width: 320px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

  /* Strategy categories */
  .cat {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding: 10px 14px 8px;
  }
  .cat-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .cat-name {
    font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 700; color: #64748B;
  }
  .cat-protocol {
    font-size: 7px; color: #334155; letter-spacing: 0.5px;
    margin-left: auto;
  }
  .cat-active {
    font-size: 8px; padding: 1px 6px; border-radius: 3px;
    font-weight: 700; letter-spacing: 0.5px;
  }
  .options { display: flex; flex-wrap: wrap; gap: 4px; }
  .opt {
    font-size: 10px; padding: 5px 10px; border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
    color: #64748B; cursor: pointer;
    transition: all 0.15s; position: relative;
  }
  .opt:hover { background: rgba(255,255,255,0.05); color: #94A3B8; }
  .opt.active {
    border-color: var(--cat-color, #A78BFA);
    color: var(--cat-color, #A78BFA);
    background: color-mix(in srgb, var(--cat-color, #A78BFA) 10%, transparent);
    font-weight: 700;
  }
  .opt .confirm-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #EF4444; position: absolute; top: 3px; right: 3px;
  }

  /* Tooltip on hover */
  .opt[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); white-space: nowrap;
    font-size: 9px; font-weight: 400; color: #94A3B8;
    background: #1E2636; border: 1px solid rgba(255,255,255,0.08);
    padding: 4px 8px; border-radius: 4px; z-index: 100;
    pointer-events: none; letter-spacing: 0;
  }

  /* Right panel */
  .last-cmd {
    padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .last-cmd-label { font-size: 7px; color: #64748B; letter-spacing: 1.5px; margin-bottom: 4px; }
  .last-cmd-value { font-size: 14px; font-weight: 700; color: #334155; transition: color 0.3s; }
  .last-cmd-value.active { color: #A78BFA; }
  .last-cmd-meta { font-size: 8px; color: #475569; margin-top: 3px; }

  .history { flex: 1; overflow-y: auto; padding: 6px 14px; }
  .history-title { font-size: 7px; color: #64748B; letter-spacing: 1.5px; margin-bottom: 4px; }
  .hist-entry {
    font-size: 9px; padding: 3px 0 3px 8px; display: flex; gap: 8px;
    border-left: 2px solid transparent; color: #475569;
  }
  .hist-entry.latest { border-left-color: #A78BFA; color: #A78BFA; font-weight: 700; }
  .hist-time { color: #334155; width: 55px; flex-shrink: 0; }

  .test-bar {
    padding: 8px 14px; border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; gap: 6px; flex-shrink: 0;
  }
  .test-input {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px; padding: 6px 10px; color: #D4DAE3;
    font-family: inherit; font-size: 10px; outline: none;
  }
  .test-input:focus { border-color: #A78BFA; }
  .test-btn {
    background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3);
    border-radius: 4px; padding: 6px 12px; color: #A78BFA;
    font-family: inherit; font-size: 9px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer;
  }

  /* Voice control */
  @keyframes micRing {
    0%   { box-shadow: 0 0 0 0 rgba(224, 64, 64, 0.55); }
    70%  { box-shadow: 0 0 0 7px rgba(224, 64, 64, 0); }
    100% { box-shadow: 0 0 0 0 rgba(224, 64, 64, 0); }
  }
  @keyframes micPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .mic-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 11px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
    cursor: pointer; outline: none; transition: all 0.2s;
  }
  .mic-btn:hover { background: rgba(255,255,255,0.07); }
  .mic-btn.recording {
    border-color: rgba(224,64,64,0.4); background: rgba(224,64,64,0.1);
    animation: micRing 1.2s ease-in-out infinite;
  }
  .mic-btn.transcribing {
    border-color: rgba(91,155,213,0.4); background: rgba(91,155,213,0.08);
    opacity: 0.7; cursor: default;
  }
  .mic-label {
    font-size: 9px; letter-spacing: 0.09em; user-select: none;
    transition: color 0.2s;
  }
  .voice-toast {
    position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; align-items: center; gap: 10px;
    padding: 6px 18px; background: rgba(8,11,16,0.92);
    backdrop-filter: blur(20px); border-radius: 20px;
    pointer-events: none; white-space: nowrap;
    animation: toastIn 0.22s ease;
  }
  .voice-toast.exiting { animation: toastOut 0.4s ease forwards; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
  .voice-toast .heard { font-size: 10px; color: #94A3B8; opacity: 0.65; letter-spacing: 0.02em; }
  .voice-toast .arrow { font-size: 9px; color: #475569; }
  .voice-toast .toast-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .voice-toast .toast-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; }
  .speaking-indicator {
    font-size: 8px; color: #22C55E; letter-spacing: 1px;
    animation: micPulse 0.8s ease infinite;
  }

  .section-label {
    font-size: 7px; color: #475569; letter-spacing: 1.5px; padding: 8px 14px 2px;
    text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  /* Additive items (evac zones, crew extensions) */
  .additive-list { padding: 4px 0; }
  .additive-item {
    font-size: 9px; padding: 2px 8px; display: flex; gap: 6px; color: #64748B;
  }
  .additive-item .zone { color: #22D3EE; font-weight: 600; width: 40px; }
  .additive-item .level { font-weight: 700; }

  .empty-msg { font-size: 9px; color: #1E2636; padding: 4px 0; font-style: italic; }
</style>
</head>
<body>
<div class="header">
  <div class="dot" id="statusDot"></div>
  <span style="font-size:10px;color:#64748B;letter-spacing:2px;text-transform:uppercase;font-weight:700">
    FIRESIGHT STRATEGY DEBUG
  </span>
  <span style="flex:1"></span>
  <span class="speaking-indicator" id="speakingInd" style="display:none">SPEAKING</span>
  <button class="mic-btn" id="micBtn" title="Click to speak a command">
    <svg width="10" height="13" viewBox="0 0 10 13" fill="none" style="flex-shrink:0">
      <rect x="3" y="0.5" width="4" height="7" rx="2" fill="currentColor"/>
      <path d="M1 6C1 8.5 2.5 10 5 10C7.5 10 9 8.5 9 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      <line x1="5" y1="10" x2="5" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="3" y1="12" x2="7" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="mic-label" id="micLabel" style="color:#64748B">VOICE</span>

</div>

<div class="main">
  <!-- LEFT: Strategy state by category -->
  <div class="left" id="strategyPanel"></div>

  <!-- RIGHT: Command log -->
  <div class="right">
    <div class="last-cmd">
      <div class="last-cmd-label">LAST TELEGRAM COMMAND</div>
      <div class="last-cmd-value" id="lastCmdValue">Waiting...</div>
      <div class="last-cmd-meta" id="lastCmdMeta"></div>
    </div>
    <div class="section-label">COMMAND HISTORY</div>
    <div class="history" id="historyList"></div>
    <div class="test-bar">
      <input class="test-input" id="testInput" placeholder="Send command..." />
      <button class="test-btn" id="testBtn">SEND</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3001';

// ── Mutually exclusive strategy categories ──
const CATEGORIES = [
  {
    key: 'posture', label: 'POSTURE', color: '#A78BFA',

  },
  {

      { value: 'triage', cmd: 'struct triage', tip: 'Assess defensibility', role: 'Struct Sup' },

    ]
  },
  {

      { value: 'head', cmd: 'air priority head', tip: 'Retardant on fire head', role: 'Air Ops Dir' },

      { value: 'flanks', cmd: 'air priority flanks', tip: 'Split force on flanks', role: 'Air Ops Dir' },
      { value: 'hold', cmd: 'air hold', tip: 'All aircraft grounded', role: 'IC / Safety' },
    ]
  },
  {
    key: 'droneMode', label: 'DRONE MODE', color: '#818CF8',
    protocol: 'UAS Operations',
    options: [
      { value: 'recon', cmd: 'drone recon', tip: 'Distributed recon grid', role: 'Plans Chief' },
      { value: 'safety', cmd: 'drone safety', tip: 'Crew safety overwatch', role: 'Safety Officer' },
    ]
  },
  {
    key: 'opsNight', label: 'NIGHT OPS', color: '#A3A3A3',
    protocol: 'NWCG Night Operations',
    options: [
      { value: false, cmd: 'night ops cancel', tip: 'Crews to camp at sunset', role: 'IC' },
      { value: true, cmd: 'night ops approve', tip: 'Night operations authorized', role: 'IC' },
    ]
  },
  {
    key: 'safetyStop', label: 'SAFETY STOP', color: '#EF4444',
    protocol: '10 Standard Fire Orders / 18 Watch Outs',
    options: [
      { value: 'none', cmd: 'safety resume', tip: 'Operations normal', role: 'IC' },
      { value: 'all', cmd: 'safety stop all', tip: 'ALL crews cease ops', role: 'Safety Officer', confirm: true },
    ]
  },
  {
    key: 'iapStatus', label: 'IAP STATUS', color: '#6B7280',
    protocol: 'ICS Planning Cycle',
    options: [
      { value: 'draft', cmd: null, tip: 'Plan being developed' },
      { value: 'approved', cmd: 'iap approve', tip: 'Plan approved by IC', role: 'IC' },
      { value: 'expired', cmd: null, tip: 'Operational period ended' },
    ]
  },
];

// ── State ──
let strategy = {};
let commandHistory = [];

// ── Render strategy panel ──
function renderStrategy() {
  const panel = document.getElementById('strategyPanel');
  let html = '';

  // Mutually exclusive categories
  for (const cat of CATEGORIES) {
    const currentVal = strategy[cat.key];
    html += `<div class="cat">
      <div class="cat-header">
        <span class="cat-name" style="color:${cat.color}">${cat.label}</span>
        <span class="cat-protocol">${cat.protocol}</span>
      </div>
      <div class="options">`;

    for (const opt of cat.options) {
      // Handle boolean comparison for opsNight
      const isActive = (currentVal === opt.value) ||
        (cat.key === 'opsNight' && currentVal === opt.value) ||
        (cat.key === 'safetyStop' && !currentVal && opt.value === 'none');

      const clickable = opt.cmd ? `onclick="sendCommand('${opt.cmd}', ${!!opt.confirm})"` : '';
      const cursor = opt.cmd ? 'cursor:pointer' : 'cursor:default;opacity:0.5';

      html += `<div class="opt ${isActive ? 'active' : ''}"
        style="--cat-color:${cat.color};${cursor}"
        ${clickable}
        data-tip="${opt.tip}">
        ${opt.value === true ? 'APPROVED' : opt.value === false ? 'CANCELLED' : opt.value.toString().toUpperCase()}
        ${opt.role ? `<span style="font-size:7px;opacity:0.5;margin-left:4px">${opt.role}</span>` : ''}
        ${opt.confirm ? '<div class="confirm-dot"></div>' : ''}
      </div>`;
    }
    html += '</div></div>';
  }

  // Medevac (boolean, independent)
  html += `<div class="cat">
    <div class="cat-header">
      <span class="cat-name" style="color:#F87171">MEDEVAC</span>
      <span class="cat-protocol">Emergency Medical</span>
    </div>
    <div class="options">
      <div class="opt ${strategy.medevacActive ? 'active' : ''}"
        style="--cat-color:#F87171;cursor:pointer"
        onclick="sendCommand('air medevac', false)"
        data-tip="Divert helicopter to medevac">
        ${strategy.medevacActive ? 'ACTIVE' : 'INACTIVE'}
      </div>
    </div>
  </div>`;

  // LCES Check (boolean)
  html += `<div class="cat">
    <div class="cat-header">
      <span class="cat-name" style="color:#FBBF24">LCES</span>
      <span class="cat-protocol">Lookouts, Comms, Escape Routes, Safety Zones</span>
    </div>
    <div class="options">
      <div class="opt ${strategy.lcesRequired ? 'active' : ''}"
        style="--cat-color:#FBBF24;cursor:pointer"
        onclick="sendCommand('lces check', false)"
        data-tip="Order all crews to verify LCES">
        ${strategy.lcesRequired ? 'CHECK ORDERED' : 'NORMAL'}
      </div>
    </div>
  </div>`;

  // Mutual Aid
  html += `<div class="cat">
    <div class="cat-header">
      <span class="cat-name" style="color:#34D399">MUTUAL AID</span>
      <span class="cat-protocol">IROC / NWCG Resource Ordering</span>
    </div>
    <div class="options">
      <div class="opt ${strategy.mutualAidRequested ? 'active' : ''}"
        style="--cat-color:#34D399;cursor:pointer"
        onclick="sendCommand('mutual aid', false)"
        data-tip="Request resources through IROC">
        ${strategy.mutualAidRequested ? 'REQUESTED' : 'NOT REQUESTED'}
      </div>
    </div>
  </div>`;

  // Evacuation zones (additive, per-zone)
  html += `<div class="cat">
    <div class="cat-header">
      <span class="cat-name" style="color:#22D3EE">EVACUATION ZONES</span>
      <span class="cat-protocol">Genasys Protect / WEA / IPAWS</span>
    </div>`;

  const zones = strategy.evacZones || {};
  const zoneEntries = Object.entries(zones).filter(([,v]) => v && v !== 'none');
  if (zoneEntries.length === 0) {
    html += '<div class="empty-msg">No active evacuations</div>';
  } else {
    html += '<div class="additive-list">';
    const levelColors = { advisory: '#60A5FA', warning: '#FBBF24', order: '#EF4444', rescue: '#DC2626', lifted: '#22C55E' };
    for (const [zone, level] of zoneEntries) {
      const c = levelColors[level] || '#64748B';
      html += `<div class="additive-item">
        <span class="zone">${zone}</span>
        <span class="level" style="color:${c}">${level.toUpperCase()}</span>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div>';

  // Crew Extensions (additive)
  html += `<div class="cat">
    <div class="cat-header">
      <span class="cat-name" style="color:#34D399">CREW EXTENSIONS</span>
      <span class="cat-protocol">NWCG Work-Rest (16hr max, 2:1)</span>
    </div>`;

  const exts = strategy.crewExtensions || {};
  const extEntries = Object.entries(exts).filter(([,v]) => v && v.authorized);
  if (extEntries.length === 0) {
    html += '<div class="empty-msg">No active extensions</div>';
  } else {
    html += '<div class="additive-list">';
    for (const [crew, ext] of extEntries) {
      html += `<div class="additive-item">
        <span class="zone">${crew}</span>
        <span class="level" style="color:#F59E0B">+${ext.hours || 2}hr</span>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div>';

  panel.innerHTML = html;
}

// ── Send command ──
function sendCommand(cmd, needsConfirm) {
  if (needsConfirm && !confirm(`SAFETY-CRITICAL: Send "${cmd}"?`)) return;

  fetch(`${API}/api/command`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ command: cmd, source: 'debug-panel', confirmed: needsConfirm || false }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.status === 'confirm_required') {
      if (confirm(`${data.warning}\n\nConfirm "${data.command}"?`)) {
        sendCommand(cmd, true);
      }
    }
    // Strategy update will come via SSE
  })
  .catch(err => console.error('Command failed:', err));
}

// ── Command history ──
function addToHistory(cmd, source, confirmed) {
  const time = new Date().toLocaleTimeString();
  commandHistory.unshift({ cmd, source, time, confirmed });
  if (commandHistory.length > 50) commandHistory.pop();

  document.getElementById('lastCmdValue').textContent = cmd;
  document.getElementById('lastCmdValue').classList.add('active');
  document.getElementById('lastCmdMeta').innerHTML =
    `via <b>${source}</b> at ${time}${confirmed ? ' <span style="color:#EF4444">CONFIRMED</span>' : ''}`;

  const list = document.getElementById('historyList');
  list.innerHTML = commandHistory.slice(0, 30).map((e, i) =>
    `<div class="hist-entry ${i === 0 ? 'latest' : ''}">
      <span class="hist-time">${e.time}</span>
      <span>${e.cmd}</span>
    </div>`
  ).join('');
}

// ── SSE ──
function connectSSE() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const es = new EventSource(`${API}/api/strategy/stream`);

  es.onopen = () => { dot.className = 'dot live'; txt.textContent = 'SSE LIVE'; txt.style.color = '#22C55E'; };
  es.onerror = () => { dot.className = 'dot dead'; txt.textContent = 'DISCONNECTED'; txt.style.color = '#EF4444'; };

  // Init event (default message)
  es.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      if (data.type === 'init' && data.strategy) {
        strategy = data.strategy;
        renderStrategy();
      }
    } catch {}
  };

  es.addEventListener('command', (ev) => {
    const data = JSON.parse(ev.data);
    if (data.strategy) { strategy = data.strategy; renderStrategy(); }
    addToHistory(data.command, data.source || 'telegram', data.confirmed);
    // Speak every command from any source (voice commands handled separately to avoid double-speak)
    maybeSpeakSSECommand(data.command, data.source);
  });

  es.addEventListener('reset', (ev) => {
    const data = JSON.parse(ev.data);
    if (data.strategy) { strategy = data.strategy; renderStrategy(); }
    addToHistory('RESET', 'system', false);
  });
}

// ── Load initial state ──
fetch(`${API}/api/strategy`)
  .then(r => r.json())
  .then(data => { strategy = data.strategy || {}; renderStrategy(); })
  .catch(() => {});

// ── Manual test ──
document.getElementById('testBtn').onclick = () => {
  const input = document.getElementById('testInput');
  const cmd = input.value.trim();
  if (!cmd) return;
  sendCommand(cmd, false);
  input.value = '';
};
document.getElementById('testInput').onkeydown = (e) => {
  if (e.key === 'Enter') document.getElementById('testBtn').click();
};

const ZONE_PATTERN = /\b(OR-?\d+|zone\s*\w+|[A-Z]{1,3}-?\d{1,3})\b/i;

// Returns an array of ICS command strings from a transcript (supports multi-command)
function nlToCommands(transcript) {
  const text = transcript.trim();
  const lower = text.toLowerCase();
  const clean = lower.replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
  const found = [];
  const usedCategories = new Set(); // prevent duplicate categories

  // Category grouping to avoid conflicting commands
  const CMD_CATEGORY = {
    'strategy offensive': 'posture', 'strategy defensive': 'posture', 'strategy confine': 'posture', 'strategy transition': 'posture',
    'attack direct': 'attack', 'attack parallel': 'attack', 'attack indirect': 'attack',
    'fire burnout': 'firing', 'fire backfire': 'firing', 'fire cancel': 'firing',
    'struct triage': 'struct', 'struct protect': 'struct', 'struct abandon': 'struct', 'struct bump-and-run': 'struct',
    'air priority head': 'air', 'air priority structures': 'air', 'air priority flanks': 'air', 'air hold': 'air',
    'air medevac': 'medevac',
    'drone recon': 'drone', 'drone safety': 'drone',
    'night ops approve': 'night', 'night ops cancel': 'night',
    'safety stop all': 'safety', 'safety resume': 'safety',
    'lces check': 'lces', 'mutual aid': 'mutual', 'iap approve': 'iap',
    'crew rotate hotshots': 'crew', 'crew extend hotshots': 'crew',
  };

  function addCmd(cmd) {
    const cat = CMD_CATEGORY[cmd] || cmd;
    if (!usedCategories.has(cat)) { usedCategories.add(cat); found.push(cmd); }
  }

  // Exact ICS command strings embedded anywhere
  const allCmds = [
    'air priority structures', 'air priority head', 'air priority flanks',
    'crew rotate hotshots', 'crew extend hotshots',
    'struct bump-and-run', 'struct bump and run',
    'strategy offensive', 'strategy defensive', 'strategy confine', 'strategy transition',
    'attack direct', 'attack parallel', 'attack indirect',
    'fire burnout', 'fire backfire', 'fire cancel',
    'struct triage', 'struct protect', 'struct abandon',
    'safety stop all', 'safety resume',
    'night ops approve', 'night ops cancel',
    'air hold', 'air medevac',
    'drone recon', 'drone safety',
    'mutual aid', 'lces check', 'iap approve',
    'evac advisory', 'evac warning', 'evac order', 'evac rescue', 'evac lift',
  ];
  for (const c of allCmds) {
    if (clean.includes(c) || lower.includes(c)) {
      addCmd(c === 'struct bump and run' ? 'struct bump-and-run' : c);
    }
  }

  // NL pattern matching — scan all rules, collect all matches
  for (const rule of NL_COMMAND_MAP) {
    if (rule.test.test(text) || rule.test.test(clean)) {
      if (rule.extractZone) {
        const zm = text.match(ZONE_PATTERN);
        const zone = zm ? zm[1].replace(/\s+/g, '') : 'OR-1';
        addCmd(rule.cmd + ' ' + zone);
      } else {
        addCmd(rule.cmd);
      }
    }
  }

  // Single keyword fallback
  if (found.length === 0) {
    const KEYWORD_FALLBACK = [
      { words: ['offensive'], cmd: 'strategy offensive' },
      { words: ['defensive'], cmd: 'strategy defensive' },
      { words: ['confine'], cmd: 'strategy confine' },
      { words: ['transition'], cmd: 'strategy transition' },
      { words: ['direct'], cmd: 'attack direct' },
      { words: ['parallel'], cmd: 'attack parallel' },
      { words: ['indirect'], cmd: 'attack indirect' },
      { words: ['burnout'], cmd: 'fire burnout' },
      { words: ['backfire'], cmd: 'fire backfire' },
      { words: ['triage'], cmd: 'struct triage' },
      { words: ['medevac'], cmd: 'air medevac' },
      { words: ['recon'], cmd: 'drone recon' },
    ];
    for (const kw of KEYWORD_FALLBACK) {
      if (kw.words.some(w => clean.includes(w))) addCmd(kw.cmd);
    }
  }

  // Last resort: raw text as single command
  if (found.length === 0) found.push(text);
  return found;
}

// ── PCM → WAV (Gemini TTS returns raw 16-bit PCM at 24kHz) ──
function pcmToWav(pcmBase64, sampleRate = 24000) {
  const pcm  = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0));
  const buf  = new ArrayBuffer(44 + pcm.length);
  const view = new DataView(buf);
  const str  = (off, s) => [...s].forEach((c, i) => view.setUint8(off + i, c.charCodeAt(0)));
  str(0, 'RIFF');  view.setUint32(4, 36 + pcm.length, true);
  str(8, 'WAVE');  str(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  str(36, 'data');  view.setUint32(40, pcm.length, true);
  new Uint8Array(buf, 44).set(pcm);
  return new Blob([buf], { type: 'audio/wav' });
}

// ── Gemini TTS — single voice at a time, queue-based ──
let ttsQueue = [];
let ttsBusy = false;

function stopAllAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

async function speakIC(text) {
  // Cancel anything currently playing — only one voice at a time
  stopAllAudio();
  ttsQueue = []; // clear any queued speech
  ttsBusy = true;

  const ind = document.getElementById('speakingInd');
  ind.style.display = 'inline';

  if (GEMINI_KEY) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${GEMINI_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text }] }],
            generationConfig: {
              responseModalities: ['AUDIO'],
              speechConfig: {
                voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Sadaltager' } },
              },
            },
          }),
        }
      );
      if (res.ok) {
        const data = await res.json();
        const pcmB64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
        if (pcmB64) {
          stopAllAudio(); // kill anything that started while we were fetching
          const wav = pcmToWav(pcmB64);
          const url = URL.createObjectURL(wav);
          const audio = new Audio(url);
          currentAudio = audio;
          audio.play();
          audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; ind.style.display = 'none'; ttsBusy = false; };
          audio.onerror = () => { currentAudio = null; ind.style.display = 'none'; ttsBusy = false; };
          return;
        }
      }
    } catch (e) { console.error('Gemini TTS error:', e); }
  }

  // No fallback — Gemini TTS only. No browser synth.
  ind.style.display = 'none';
  ttsBusy = false;
}

// ── ElevenLabs STT ──
async function transcribeAudio(blob) {
  const formData = new FormData();
  formData.append('file', blob, 'recording.webm');
  formData.append('model_id', 'scribe_v1');
  formData.append('language_code', 'eng');
  // Context prompt helps STT focus on ICS commands and ignore background noise
  formData.append('prompt', 'Wildfire incident commander issuing tactical commands: go defensive, go offensive, strategy confine, attack direct, attack parallel, attack indirect, fire burnout, fire backfire, struct protect, struct triage, struct abandon, bump and run, air priority head, air priority structures, air priority flanks, air hold, ground the aircraft, drone recon, drone safety, evacuate, medevac, mutual aid, safety stop, lces check, night ops, pull back, hit it hard, protect the structures, retardant on the head');
  const res = await fetch('https://api.elevenlabs.io/v1/speech-to-text', {
    method: 'POST',
    headers: { 'xi-api-key': EL_KEY },
    body: formData,
  });
  if (!res.ok) throw new Error(`EL STT error ${res.status}`);
  const data = await res.json();
  return data.text?.trim() ?? '';
}

// ── Voice toast ──
function showVoiceToast(heard, label, color) {
  clearTimeout(toastTimeout); clearTimeout(toastExitTimeout);
  let existing = document.getElementById('voiceToast');
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.id = 'voiceToast';
  el.className = 'voice-toast';
  el.style.borderColor = color + '35';
  el.style.boxShadow = `0 6px 24px rgba(0,0,0,0.6), 0 0 0 1px ${color}18`;
  el.innerHTML = `
    ${heard ? `<span class="heard">"${heard}"</span><span class="arrow">&rarr;</span>` : ''}
    <div class="toast-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>
    <span class="toast-label" style="color:${color}">${label}</span>
  `;
  document.body.appendChild(el);

  toastTimeout = setTimeout(() => {
    el.classList.add('exiting');
    toastExitTimeout = setTimeout(() => el.remove(), 400);
  }, 3000);
}

// ── Stop VAD ──
function stopVAD() {
  cancelAnimationFrame(vadRaf);
  clearTimeout(silTimer);
  clearTimeout(maxTimer);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

// ── Stop recording ──
function stopRecording() {
  stopVAD();
  if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
  mediaRecorder = null;
}

// ── Start recording ──
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    const rec = new MediaRecorder(stream);
    rec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    rec.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      stopVAD();
      voiceStatus = 'transcribing';
      updateMicUI();

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      try {
        const text = await transcribeAudio(blob);
        if (!text) {
          showVoiceToast('', 'NO SPEECH DETECTED', '#64748B');
          voiceStatus = 'idle'; updateMicUI();
          return;
        }

        // Map natural language → ICS command(s)
        const cmds = nlToCommands(text);
        console.log('[VOICE] transcript:', text, '→ commands:', cmds);

        showVoiceToast(text, cmds.length + ' COMMAND' + (cmds.length > 1 ? 'S' : ''), '#A78BFA');

        // Send all commands to FireSight server
        const results = await Promise.all(cmds.map(cmd =>
          fetch(`${API}/api/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd, source: 'voice', confirmed: false }),
          }).then(r => r.json()).catch(() => ({ status: 'error' }))
        ));

        // Also relay transcript to OpenClaw
        sendToOpenClaw(text).catch(e => console.warn('[VOICE] OpenClaw relay failed:', e));

        // Build combined ack from all successful commands
        const acks = [];
        let hasConfirm = false;
        for (let i = 0; i < results.length; i++) {
          const data = results[i];
          const cmd = cmds[i];
          if (data.status === 'confirm_required') {
            hasConfirm = true;
          } else if (data.status === 'ok') {
            acks.push(IC_ACK[data.command || cmd] || IC_ACK_DEFAULT);
            lastSpokenCmd = data.command || cmd;
            lastSpokenTime = Date.now();
          }
        }

        if (acks.length > 0) {
          showVoiceToast(text, acks.length + ' EXECUTED', '#22C55E');
          let speech = acks.join(' ');
          if (acks.length > 1) {
            speech += ' That\'s ' + acks.length + ' orders confirmed, all units acknowledge.';
          }
          speakIC(speech);
        } else if (hasConfirm) {
          showVoiceToast(text, 'CONFIRM REQUIRED', '#EF4444');
          speakIC('Confirm that order, Commander.');
        } else {
          showVoiceToast(text, 'COMMAND FAILED', '#EF4444');
          speakIC('Command not recognized. Say again.');
        }
      } catch (err) {
        console.error('Voice pipeline error:', err);
        showVoiceToast('', 'TRANSCRIPTION FAILED', '#EF4444');
      }
      voiceStatus = 'idle'; updateMicUI();
    };

    rec.start();
    mediaRecorder = rec;
    voiceStatus = 'recording';
    updateMicUI();

    // ── VAD: auto-stop after 1.5s silence post-speech ──
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);

    const buf = new Uint8Array(analyser.frequencyBinCount);
    let hasSpeech = false;
    const SPEECH_THRESHOLD = 20;   // higher = ignore background chatter, only pick up close mic speech
    const SILENCE_MS = 1500;
    const MAX_MS = 15000;

    maxTimer = setTimeout(() => stopRecording(), MAX_MS);

    const tick = () => {
      analyser.getByteFrequencyData(buf);
      const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
      if (avg > SPEECH_THRESHOLD) {
        hasSpeech = true;
        clearTimeout(silTimer); silTimer = null;
      } else if (hasSpeech && !silTimer) {
        silTimer = setTimeout(() => stopRecording(), SILENCE_MS);
      }
      vadRaf = requestAnimationFrame(tick);
    };
    vadRaf = requestAnimationFrame(tick);

  } catch (err) {
    showVoiceToast('', 'MIC ACCESS DENIED', '#EF4444');
    voiceStatus = 'idle'; updateMicUI();
  }
}

// ── Hold V to record, release V to send ──
let vHeld = false;
document.addEventListener('keydown', (e) => {
  if (e.key === 'v' || e.key === 'V') {
    if (e.repeat) return; // ignore key repeat
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return; // don't hijack text fields
    if (voiceStatus !== 'idle') return;
    vHeld = true;
    startRecording();
  }
});
document.addEventListener('keyup', (e) => {
  if ((e.key === 'v' || e.key === 'V') && vHeld) {
    vHeld = false;
    if (voiceStatus === 'recording') stopRecording();
  }
});

function maybeSpeakSSECommand(command, source) {
  // Voice commands are already spoken directly in the voice pipeline — never double-speak
  if (source === 'voice') return;

  // Skip if we already spoke this exact command recently
  const now = Date.now();
  if ((now - lastSpokenTime) < 5000 && lastSpokenCmd === command) return;

  // Skip if TTS is currently busy playing something
  if (ttsBusy || currentAudio) return;

  const ack = IC_ACK[command] || IC_ACK_DEFAULT;
  lastSpokenCmd = command;
  lastSpokenTime = now;
  speakIC(ack);
}

// ── Init ──
if (window.speechSynthesis) window.speechSynthesis.cancel(); // kill any browser TTS on load
connectSSE();
</script>
