<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICS Wildfire Command Chain — Autonomous Agent Simulation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0E17;color:#E2E8F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw}
#ui,#legend,#stats,#msg-log,#event-banner,#timeline-bar{display:none!important}
canvas{display:block}
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none}
#title-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(10,14,23,.85);border-bottom:1px solid #1E2636;pointer-events:auto}
#title-bar h1{font-size:14px;letter-spacing:1px;color:#A78BFA;font-weight:600}
#title-bar .sub{font-size:10px;color:#64748B;margin-left:12px}
#phase-bar{display:flex;gap:8px;align-items:center}
#phase-bar button{background:#111827;border:1px solid #1E2636;color:#94A3B8;padding:4px 12px;border-radius:4px;font-size:10px;cursor:pointer;pointer-events:auto;transition:all .2s}
#phase-bar button:hover{border-color:#A78BFA;color:#E2E8F0}
#phase-bar button.active{background:#A78BFA20;border-color:#A78BFA;color:#A78BFA}
#legend{position:absolute;bottom:16px;left:16px;background:rgba(17,24,39,.9);border:1px solid #1E2636;border-radius:8px;padding:12px 16px;font-size:9px;pointer-events:auto;max-width:280px}
#legend h3{font-size:10px;color:#A78BFA;margin-bottom:8px;letter-spacing:1px}
.leg-row{display:flex;align-items:center;gap:6px;margin:3px 0;color:#94A3B8}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-line{width:20px;height:2px;flex-shrink:0;border-radius:1px}
#tooltip{position:absolute;display:none;background:rgba(17,24,39,.95);border:1px solid #1E2636;border-radius:6px;padding:10px 14px;font-size:10px;max-width:320px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100}
#tooltip .tt-title{font-size:12px;font-weight:700;margin-bottom:4px}
#tooltip .tt-role{font-size:9px;color:#64748B;margin-bottom:6px}
#tooltip .tt-section{margin-top:6px;padding-top:6px;border-top:1px solid #1E2636}
#tooltip .tt-label{font-size:8px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
#tooltip .tt-flow{font-size:9px;color:#94A3B8;line-height:1.4}
#stats{position:absolute;top:50px;right:16px;background:rgba(17,24,39,.9);border:1px solid #1E2636;border-radius:8px;padding:12px 16px;font-size:9px;pointer-events:auto;width:220px}
#stats h3{font-size:10px;color:#A78BFA;margin-bottom:8px;letter-spacing:1px}
.stat-row{display:flex;justify-content:space-between;margin:3px 0;color:#94A3B8}
.stat-val{color:#E2E8F0;font-weight:600}
#msg-log{position:absolute;bottom:16px;right:16px;background:rgba(17,24,39,.9);border:1px solid #1E2636;border-radius:8px;padding:12px 16px;font-size:9px;pointer-events:auto;width:380px;max-height:340px;overflow-y:auto}
#msg-log h3{font-size:10px;color:#A78BFA;margin-bottom:8px;letter-spacing:1px}
.msg{padding:4px 0;border-bottom:1px solid #1E263620;line-height:1.3}
.msg-from{font-weight:600;margin-right:4px}
.msg-to{color:#64748B}
.msg-text{color:#94A3B8;display:block;margin-top:1px}
#sim-controls{display:flex;gap:10px;align-items:center;pointer-events:auto}
#sim-controls span{font-size:9px;color:#64748B}
#play-btn{background:#111827;border:1px solid #A78BFA;color:#A78BFA;padding:5px 16px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:1px;transition:all .2s}
#play-btn:hover{background:#A78BFA20}
#play-btn.playing{border-color:#EF4444;color:#EF4444}
#play-btn.playing:hover{background:#EF444420}
#speed-wrap{display:flex;align-items:center;gap:6px}
#speed-slider{-webkit-appearance:none;width:100px;height:4px;border-radius:2px;background:#1E2636;outline:none}
#speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#A78BFA;cursor:pointer;border:2px solid #0A0E17}
#speed-label{font-size:10px;color:#A78BFA;font-weight:600;min-width:30px}
#timeline-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:#111827;pointer-events:none}
#timeline-progress{height:100%;width:0%;background:linear-gradient(90deg,#A78BFA,#F472B6);transition:width .3s}
#event-banner{position:absolute;top:55px;left:50%;transform:translateX(-50%);background:rgba(17,24,39,.95);border:1px solid #A78BFA40;border-radius:8px;padding:10px 24px;font-size:12px;color:#E2E8F0;pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap;z-index:50;text-align:center}
#event-banner .ev-time{font-size:9px;color:#A78BFA;letter-spacing:1px;margin-bottom:2px}
#event-banner .ev-text{font-size:13px;font-weight:600}
#event-banner .ev-detail{font-size:9px;color:#94A3B8;margin-top:3px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<!-- UI panels hidden — graph + tooltip only -->
<div id="ui" style="display:none">
  <div id="title-bar">
    <div style="display:flex;align-items:baseline">
      <h1>ICS WILDFIRE COMMAND CHAIN</h1>
      <span class="sub">Autonomous agent simulation — real ICS protocol</span>
    </div>
    <div id="sim-controls">
      <button id="play-btn" onclick="togglePlay()">PLAY</button>
      <button onclick="resetSim()">RESET</button>
      <div id="speed-wrap">
        <span>SPEED:</span>
        <input type="range" id="speed-slider" min="0.1" max="10" step="0.1" value="1" oninput="setSpeed(this.value)">
        <span id="speed-label">1.0x</span>
      </div>
    </div>
  </div>
</div>
<div id="tooltip"></div>
<div id="legend" style="display:none"></div>
<div id="stats" style="display:none">
  <span class="stat-val" id="s-time">T+0:00</span>
  <span class="stat-val" id="s-acres">0</span>
  <span class="stat-val" id="s-ros">0</span>
  <span class="stat-val" id="s-contain">0%</span>
  <span class="stat-val" id="s-nodes">0</span>
  <span class="stat-val" id="s-edges">0</span>
  <span class="stat-val" id="s-scenario">Standby</span>
  <span class="stat-val" id="s-type">--</span>
  <span class="stat-val" id="s-wind">SW 18mph</span>
  <span class="stat-val" id="s-struct">0</span>
</div>
<div id="msg-log" style="display:none">
  <h3>MESSAGE FLOW</h3>
  <div id="messages"></div>
</div>
<div id="event-banner" style="display:none"><div class="ev-time"></div><div class="ev-text"></div><div class="ev-detail"></div></div>
<div id="timeline-bar" style="display:none"><div id="timeline-progress"></div></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');
const msgEl=document.getElementById('messages');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FIRE PHYSICS — Only hardcoded data. Everything else is autonomous.
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FIRE={
  origin:{x:0.62,y:0.38},
  wind:{dir:225,speed:18,gustSpeed:28},
  slope:15,fuelMoisture:3,temp:94,rh:8,
  community:{x:0.42,y:0.22,name:'Oak Ridge',pop:1200,structures:180},
  windShiftTime:70*60,windShiftDir:315,windShiftSpeed:22,windShiftGust:35,
  perimeter:[],area:0,ros:0,intensity:0,containment:0,spots:[],
  threatenedStructures:0,windShifted:false,

  calcROS(ws,slope,fm){
    const R0=8,phiW=0.5*Math.pow(ws/10,1.3),phiS=0.4*Math.pow(Math.tan(slope*Math.PI/180),1.5);
    return R0*(1+phiW+phiS)*Math.max(0.1,1-0.08*fm);
  },
  getWindDir(t){return t>=this.windShiftTime?this.windShiftDir:this.wind.dir},
  getWindSpeed(t){
    const ws=t>=this.windShiftTime?this.windShiftSpeed:this.wind.speed;
    const gs=t>=this.windShiftTime?this.windShiftGust:this.wind.gustSpeed;
    return ws+Math.sin(t*0.3)*(gs-ws)*0.5;
  },
  tick(dt,simT){
    if(dt<=0)return;
    this.windShifted=simT>=this.windShiftTime;
    const wd=this.getWindDir(simT),effWind=this.getWindSpeed(simT);
    this.ros=this.calcROS(effWind,this.slope,this.fuelMoisture);
    this.intensity=Math.min(10,this.ros*0.08*effWind);
    const windRad=(wd+180)*Math.PI/180,hdx=Math.sin(windRad),hdy=-Math.cos(windRad);
    const headRate=this.ros*0.0003*dt,containF=Math.max(0.1,1-this.containment*0.008);
    if(!this.perimeter.length){
      for(let i=0;i<16;i++){const a=i/16*Math.PI*2;this.perimeter.push({x:this.origin.x+Math.cos(a)*0.005,y:this.origin.y+Math.sin(a)*0.005})}
    }
    for(const p of this.perimeter){
      const dx=p.x-this.origin.x,dy=p.y-this.origin.y;
      const dot=dx*hdx+dy*hdy,dist=Math.sqrt(dx*dx+dy*dy)||0.001;
      const rate=dot>0?headRate*(0.3+0.7*Math.abs(dot)/dist):headRate*0.05;
      p.x+=hdx*rate*containF+(Math.random()-.5)*rate*0.1;
      p.y+=hdy*rate*containF+(Math.random()-.5)*rate*0.1;
    }
    let a2=0;for(let i=0;i<this.perimeter.length;i++){const j=(i+1)%this.perimeter.length;a2+=this.perimeter[i].x*this.perimeter[j].y-this.perimeter[j].x*this.perimeter[i].y}
    this.area=Math.abs(a2)*0.5*12000;
    if(this.ros>25&&Math.random()<0.002*dt&&this.spots.length<4){
      const sd=0.02+Math.random()*0.04;
      this.spots.push({x:this.origin.x+hdx*sd+(Math.random()-.5)*0.01,y:this.origin.y+hdy*sd+(Math.random()-.5)*0.01,t:simT,confirmed:false,area:0.1});
    }
    for(const s of this.spots)s.area+=dt*0.0005*this.ros;
    const head=this.getHead(),dc=Math.sqrt((head.x-this.community.x)**2+(head.y-this.community.y)**2);
    this.threatenedStructures=dc<0.15?Math.min(this.community.structures,Math.round((0.15-dc)/0.15*this.community.structures)):0;
  },
  getHead(){
    if(!this.perimeter.length)return this.origin;
    const wr=(this.wind.dir+180)*Math.PI/180,hx=Math.sin(wr),hy=-Math.cos(wr);
    let best=-Infinity,head=this.perimeter[0];
    for(const p of this.perimeter){const d=(p.x-this.origin.x)*hx+(p.y-this.origin.y)*hy;if(d>best){best=d;head=p}}
    return head;
  },
  distTo(x,y){let m=Infinity;for(const p of this.perimeter){const d=Math.hypot(p.x-x,p.y-y);if(d<m)m=d}return m},
  etaMins(x,y){const d=this.distTo(x,y),r=this.ros*0.0003;return r>0?d/r/60:Infinity},
  reset(){this.perimeter=[];this.area=0;this.ros=0;this.intensity=0;this.containment=0;this.spots=[];this.threatenedStructures=0;this.windShifted=false}
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NODE DEFINITIONS — ICS organizational chart

const NODES={

    role:'Overall authority. Sets objectives, strategies, priorities. Approves IAP and evacuation orders.'},
  safety:{label:'Safety Officer',short:'SAFETY',tier:'command',color:'#EF4444',size:18,
    role:'Monitors safety. Authority to STOP any unsafe operation immediately. Checks 10 Orders + 18 Watch Outs.'},
  pio:{label:'Public Info Officer',short:'PIO',tier:'command',color:'#EF4444',size:16,
    role:'Media coordination. Community alerts. Single point of contact for press.'},
  liaison:{label:'Liaison Officer',short:'LIAS',tier:'command',color:'#EF4444',size:16,
    role:'Multi-agency coordination. Mutual aid agreements.'},
  // GENERAL STAFF
  ops_chief:{label:'Operations Section Chief',short:'OPS',tier:'staff',color:'#A78BFA',size:24,

  plan_chief:{label:'Planning Section Chief',short:'PLAN',tier:'staff',color:'#A78BFA',size:22,
    role:'Situation assessment, fire behavior analysis, resource tracking. Runs P-meeting. Drafts IAP.'},
  log_chief:{label:'Logistics Section Chief',short:'LOG',tier:'staff',color:'#A78BFA',size:20,
    role:'Facilities, services, supplies. Communications infrastructure, medical, food.'},
  fin_chief:{label:'Finance/Admin Chief',short:'FIN',tier:'staff',color:'#A78BFA',size:16,
    role:'Cost tracking, contracts, compensation. Critical for Type 1/2 incidents.'},
  // BRANCHES
  fire_branch:{label:'Fire Suppression Branch',short:'FIRE BR',tier:'branch',color:'#FBBF24',size:18,
    role:'Directs all ground and air suppression operations under Ops Chief.'},
  air_ops:{label:'Air Operations Branch',short:'AIR OPS',tier:'branch',color:'#FBBF24',size:18,
    role:'Coordinates all aircraft: tankers, helicopters, lead planes, drones.'},
  div_alpha:{label:'Division Alpha (Head)',short:'DIV-A',tier:'branch',color:'#FBBF24',size:14,
    role:'Supervises resources attacking the fire head — most aggressive front.'},
  div_bravo:{label:'Division Bravo (Flanks)',short:'DIV-B',tier:'branch',color:'#FBBF24',size:14,
    role:'Fireline construction and holding on flanks.'},
  struct_group:{label:'Structure Protection Group',short:'STRUCT',tier:'branch',color:'#FBBF24',size:14,
    role:'Triage structures. Deploy engines for protection. Bump-and-run.'},
  sit_unit:{label:'Situation Unit',short:'SIT',tier:'branch',color:'#FBBF24',size:14,
    role:'Maintains situation display. Maps, projections, forecasts.'},
  fban:{label:'Fire Behavior Analyst',short:'FBAN',tier:'branch',color:'#FBBF24',size:16,
    role:'Runs fire spread models. Predicts ROS, flame length, spotting. 30-60 min cycle.'},
  res_unit:{label:'Resources Unit',short:'RESU',tier:'branch',color:'#FBBF24',size:12,
    role:'Tracks status and location of all assigned resources.'},
  le_branch:{label:'Law Enforcement Branch',short:'LE BR',tier:'branch',color:'#FBBF24',size:14,
    role:'Executes evacuation orders. Door-to-door. Traffic control.'},
  comms:{label:'Communications Unit',short:'COMMS',tier:'branch',color:'#FBBF24',size:14,
    role:'P25 radio. Manages frequencies, repeaters, interop gateways.'},
  medical:{label:'Medical Unit',short:'MED',tier:'branch',color:'#FBBF24',size:12,
    role:'EMS along fireline and evacuation routes.'},
  // TACTICAL
  engines:{label:'Type 3 Engines (×3)',short:'ENG×3',tier:'tactical',color:'#22D3EE',size:14,
    role:'3-person crew, 500gal. Direct attack with hose lines. Pump-and-roll.'},
  hotshots:{label:'Hotshot Crew (IHC)',short:'IHC',tier:'tactical',color:'#22D3EE',size:14,
    role:'20-person elite. Hand line construction, burnout/backfire with drip torches.'},
  hand_crew:{label:'Type 2 Hand Crew',short:'T2 HC',tier:'tactical',color:'#22D3EE',size:12,
    role:'20-person crew. Manual fireline, mop-up, cold trailing.'},
  dozer:{label:'Dozer (Cat D8)',short:'DZR',tier:'tactical',color:'#22D3EE',size:12,
    role:'Cuts 10-20ft firebreak. Fast but needs road access.'},
  vlat:{label:'VLAT DC-10',short:'VLAT',tier:'tactical',color:'#22D3EE',size:16,
    role:'11,600gal Phos-Chek. Drops AHEAD of fire. 35min turnaround.'},
  seat:{label:'SEAT Air Tractor',short:'SEAT',tier:'tactical',color:'#22D3EE',size:12,
    role:'800gal retardant. Fast turnaround. Flanks and initial attack.'},
  lead_plane:{label:'Lead Plane',short:'LEAD',tier:'tactical',color:'#22D3EE',size:12,
    role:'Scouts drop zone, marks with smoke, guides tanker approach.'},
  heli:{label:'Helitack (Chinook)',short:'HELI',tier:'tactical',color:'#22D3EE',size:14,

  tender:{label:'Water Tender',short:'WTR',tier:'tactical',color:'#22D3EE',size:10,
    role:'4,000gal. Shuttles water to engines on fireline.'},
  struct_eng:{label:'Structure Engine',short:'STRC',tier:'tactical',color:'#22D3EE',size:12,
    role:'Structure protection: triage, sprinklers, gel, foam.'},
  atgs:{label:'Air Tactical (OV-10A)',short:'ATGS',tier:'tactical',color:'#22D3EE',size:14,
    role:'Flies at 2000ft. Directs all air ops. Override authority on drones.'},
  drones:{label:'UAS Fleet Control',short:'UAS',tier:'tactical',color:'#22D3EE',size:14,
    role:'Coordinates all drone operations. Deconflicts airspace with manned aircraft.'},
  // Individual drone types — activated as deployed
  drone_scout:{label:'DFR Scouts (Skydio/M30T)',short:'SCOUT',tier:'tactical',color:'#22D3EE',size:11,
    role:'DJI M30T + Skydio X10. 40mph. Thermal+visual. First on-scene fire confirmation.'},
  drone_mapper:{label:'Mapping Fixed-Wing (eBee)',short:'MAPPER',tier:'tactical',color:'#60A5FA',size:11,

  drone_reaper:{label:'MQ-9 Reaper (HALE ISR)',short:'MQ-9',tier:'tactical',color:'#E2E8F0',size:13,

  drone_safety:{label:'Safety Overwatch (Mavic 3T)',short:'SAFE-D',tier:'tactical',color:'#34D399',size:10,

  drone_relay:{label:'Comms Relay UAS',short:'RELAY',tier:'tactical',color:'#A78BFA',size:10,

  drone_ignis:{label:'IGNIS Aerial Ignition (M600)',short:'IGNIS',tier:'tactical',color:'#F97316',size:11,

  drone_suppress:{label:'FireSwarm Thunder (Heavy-lift)',short:'F-SWM',tier:'tactical',color:'#F472B6',size:11,

  // Individual ground units matching map
  eng_69a:{label:'Engine 69A (LAFD)',short:'E-69A',tier:'tactical',color:'#22D3EE',size:9,

  eng_69b:{label:'Engine 69B (LAFD)',short:'E-69B',tier:'tactical',color:'#22D3EE',size:9,

  eng_23:{label:'Engine 23 (LAFD)',short:'E-23',tier:'tactical',color:'#22D3EE',size:9,

  tender_71:{label:'Water Tender 71 (LACoFD)',short:'WT-71',tier:'tactical',color:'#22D3EE',size:9,

  heli_1:{label:'Helitack H-1 (Chinook)',short:'H-1',tier:'tactical',color:'#22D3EE',size:11,

  vlat_1:{label:'VLAT AT-1 (DC-10)',short:'AT-1',tier:'tactical',color:'#22D3EE',size:12,

  seat_1:{label:'SEAT SE-1 (Air Tractor)',short:'SE-1',tier:'tactical',color:'#22D3EE',size:10,
    role:'AT-802 Air Tractor, Van Nuys ATB. 800gal retardant.'},
  lead_1:{label:'Lead Plane LP-1 (OV-10A)',short:'LP-1',tier:'tactical',color:'#22D3EE',size:10,

  ihc_8:{label:'Hotshot Crew IHC-8',short:'IHC-8',tier:'tactical',color:'#22D3EE',size:11,
    role:'Camp 8 Malibu Canyon. 20-person elite. Hand line, burnout/backfire.'},
  hc_2:{label:'Hand Crew HC-2',short:'HC-2',tier:'tactical',color:'#22D3EE',size:9,
    role:'Camp 8 Malibu. Type 2, 20-person crew. Pulaski, McLeod tools.'},
  hc_5:{label:'Hand Crew HC-5',short:'HC-5',tier:'tactical',color:'#22D3EE',size:9,
    role:'Topanga Station. Type 2, 20-person crew.'},
  dozer_1:{label:'Dozer DZ-1 (Cat D8)',short:'DZ-1',tier:'tactical',color:'#22D3EE',size:10,
    role:'Caltrans Sepulveda. Cat D8T, 10-20ft firebreak blade.'},
  struct_19:{label:'Structure Engine SP-19',short:'SP-19',tier:'tactical',color:'#22D3EE',size:10,
    role:'LAFD Station 19, Brentwood. Pierce Arrow XT, foam/gel. 4-person crew.'},
  traffic:{label:'Traffic Control',short:'TRAF',tier:'tactical',color:'#22D3EE',size:10,
    role:'Law enforcement at intersections. Contraflow. Route management.'},
  // EXTERNAL SENSORS (always on — they detect autonomously)

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AUTONOMOUS AGENT ENGINE
// Each agent has: state, inbox, cooldowns, and a tick() function
// that makes independent decisions based on what it knows
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const agents={};
const messageQueue=[];
let litNodes=new Set();
let icsPhase='standby'; // standby → initial → extended → crisis → full

function initAgent(id){
  agents[id]={
    active:false,
    lastTick:0,
    cooldown:0, // seconds until next action
    tickInterval:5, // how often this agent thinks (seconds)
    inbox:[],
    state:{},
    sent:{} // track what was already reported (dedup)
  };
}
for(const id of Object.keys(NODES))initAgent(id);

// Send a message from one agent to another
function agentSend(from,to,msg,type){
  if(!agents[from]||!agents[to])return;
  // Activate receiver
  if(!agents[to].active){
    agents[to].active=true;
    litNodes.add(to);
  }
  if(!agents[from].active){
    agents[from].active=true;
    litNodes.add(from);
  }
  agents[to].inbox.push({from,msg,t:simTime,type:type||'intel'});
  messageQueue.push({from,to,msg,type:type||'intel',t:simTime});
  // Spawn visual particle
  spawnMsgParticle(from,to,type||'intel');
  // Log
  const fn=NODES[from],tn=NODES[to];
  const div=document.createElement('div');
  div.className='msg';
  const ts=formatSimTime(simTime);
  div.innerHTML=`<span style="color:#64748B;font-size:8px">[${ts}]</span> <span class="msg-from" style="color:${fn?.color||'#fff'}">${fn?.short||from}</span><span class="msg-to"> → ${tn?.short||to}</span><span class="msg-text">${msg}</span>`;
  msgEl.prepend(div);
  if(msgEl.children.length>50)msgEl.removeChild(msgEl.lastChild);
}

function showBanner(text,detail){
  const b=document.getElementById('event-banner');
  b.querySelector('.ev-time').textContent=formatSimTime(simTime);
  b.querySelector('.ev-text').textContent=text;
  b.querySelector('.ev-detail').textContent=detail||'';
  b.style.opacity='1';
  clearTimeout(b._t);
  b._t=setTimeout(()=>{b.style.opacity='0'},5000/Math.max(1,simSpeed));
}

// Helper: has this agent already sent a message with this key?
function hasSent(id,key){return agents[id].sent[key]===true}
function markSent(id,key){agents[id].sent[key]=true}

// Helper: read last inbox message from a specific sender
function lastFrom(id,fromId){
  const msgs=agents[id].inbox.filter(m=>m.from===fromId);
  return msgs.length?msgs[msgs.length-1]:null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AGENT DECISION LOGIC — Each type thinks independently
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const AGENT_TICK={

  // ── EXTERNAL SENSORS: Always on, detect fire autonomously ──
  alert_cam(a,dt){
    a.tickInterval=2; // cameras sweep every 2 min real time
    // Detection delay: fire must burn 2+ min AND produce visible smoke (>0.15 acres)
    // Realistic: ALERTCalifornia detects 38% of fires before first 911 call
    if(FIRE.area>0.15&&simTime>120&&!hasSent('alert_cam','detect')){
      markSent('alert_cam','detect');
      const bearing=Math.round(Math.atan2(FIRE.origin.x-0.5,0.5-FIRE.origin.y)*180/Math.PI+360)%360;
      agentSend('alert_cam','dispatch',`SMOKE DETECTED: Camera CAM-1247, bearing ${bearing}°, confidence 94%, AI-confirmed multiple frames`,'intel');
      showBanner('WILDFIRE DETECTED','ALERTCalifornia AI camera detects smoke plume');
    }
  },

  satellite(a,dt){
    a.tickInterval=8; // GOES scans every 5-15 min
    if(FIRE.area>0.5&&!hasSent('satellite','detect')){
      markSent('satellite','detect');
      agentSend('satellite','dispatch',`GOES-18 hot spot confirmed: 34.41°N 118.59°W, FRP ${Math.round(FIRE.intensity*5)} MW`,'intel');
    }
    // Periodic updates
    if(FIRE.area>5&&simTime-a.state.lastReport>30){
      a.state.lastReport=simTime;
      agentSend('satellite','sit_unit',`VIIRS perimeter update: ${Math.round(FIRE.area)} acres, FRP ${Math.round(FIRE.intensity*8)} MW`,'intel');
      if(agents.ai_predict.active)agentSend('satellite','ai_predict',`Perimeter data: ${Math.round(FIRE.area)} acres, growth rate ${FIRE.area>20?'RAPID':'moderate'}`,'intel');
    }
  },

  raws(a,dt){
    a.tickInterval=10; // RAWS reports every 10 min (automated, always on)
    // RAWS stations are always broadcasting — they activate independently
    if(!a.active){a.active=true;litNodes.add('raws');return}
    const ws=Math.round(FIRE.getWindSpeed(simTime));
    const wdNames=['N','NE','E','SE','S','SW','W','NW'];
    const wdn=wdNames[Math.round(FIRE.getWindDir(simTime)/45)%8];
    const msg=`RAWS #042: Wind ${wdn} ${ws}mph, Temp ${FIRE.temp}°F, RH ${FIRE.rh}%, 10hr FM ${FIRE.fuelMoisture}%`;
    if(agents.fban.active)agentSend('raws','fban',msg,'intel');
    if(agents.ai_predict.active)agentSend('raws','ai_predict',msg,'intel');
    if(agents.dispatch.active&&!agents.fban.active)agentSend('raws','dispatch',msg,'intel');
    // Detect wind shift
    if(FIRE.windShifted&&!hasSent('raws','windshift')){
      markSent('raws','windshift');
      agentSend('raws','fban',`CRITICAL: Wind shift detected! Now ${wdn} ${ws}mph gusting ${FIRE.windShiftGust}mph`,'safety');
      if(agents.ai_predict.active)agentSend('raws','ai_predict',`WIND SHIFT: ${wdn} ${ws}mph gusting ${FIRE.windShiftGust}mph — recalculate all predictions`,'safety');
      showBanner('WIND SHIFT DETECTED',`Wind now from ${wdn} at ${ws}mph gusting ${FIRE.windShiftGust}mph`);
    }
  },

  nws(a,dt){
    a.tickInterval=30;
    // Respond to FBAN spot forecast requests
    const req=lastFrom('nws','fban');
    if(req&&!hasSent('nws','forecast1')){
      markSent('nws','forecast1');
      const etaShift=Math.max(0,Math.round((FIRE.windShiftTime-simTime)/60));
      agentSend('nws','fban',`SPOT FORECAST: Wind shift to NW expected in ${etaShift} min. Gusts to ${FIRE.windShiftGust}mph. RH recovery to 15% overnight. Red Flag Warning in effect.`,'intel');
    }
  },

  firis(a,dt){
    a.tickInterval=25;
    if(!a.active||FIRE.area<10)return;
    if(agents.sit_unit.active){
      agentSend('firis','sit_unit',`Aerial IR map: fire perimeter ${Math.round(FIRE.area)} acres, hot spots concentrated at head, ${FIRE.spots.length} spot fires detected`,'intel');
    }
  },

  // ── DISPATCH: Receives detections, dispatches resources ──
  dispatch(a,dt){
    a.tickInterval=3;
    // Wait for detection alerts
    const camAlert=lastFrom('dispatch','alert_cam');
    const satAlert=lastFrom('dispatch','satellite');
    if((camAlert||satAlert)&&!hasSent('dispatch','ia_dispatch')){
      markSent('dispatch','ia_dispatch');
      // CAD auto-generates Initial Attack response
      showBanner('911 DISPATCH ACTIVATED','CAD auto-generates Initial Attack assignment');
      agentSend('dispatch','ic',`INITIAL DISPATCH: Vegetation fire, est. ${Math.round(Math.max(0.25,FIRE.area))} acre, fast-moving. Dispatching: 3 Type 3 engines (ETA 8min), 1 helitack (ETA 12min), 1 water tender (ETA 6min). IC designation: Engine 51 Captain.`,'command');
      // Activate IA resources with ETAs (resources must travel to incident)
      agents.engines.active=true;litNodes.add('engines');agents.engines.state.eta=simTime+8*60;agents.engines.state.enRoute=true;
      // Individual engines
      ['eng_69a','eng_69b','eng_23'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      agentSend('dispatch','eng_69a','DISPATCH: Respond to vegetation fire, Pacific Palisades. Engine 69A first due.','command');
      agentSend('dispatch','eng_69b','DISPATCH: Engine 69B, second due. Support E-69A right flank.','command');
      agentSend('dispatch','eng_23','DISPATCH: Engine 23, third due from Brentwood. Structure standby.','command');
      agents.heli.active=true;litNodes.add('heli');agents.heli.state.eta=simTime+12*60;agents.heli.state.enRoute=true;
      agents.heli_1.active=true;litNodes.add('heli_1');
      agentSend('dispatch','heli_1','DISPATCH: Helitack H-1 Chinook, launch from SMO. Bucket drops on fire head.','command');
      agents.tender.active=true;litNodes.add('tender');agents.tender.state.eta=simTime+6*60;agents.tender.state.enRoute=true;
      agents.tender_71.active=true;litNodes.add('tender_71');
      agentSend('dispatch','tender_71','DISPATCH: Water Tender 71, stage at Sunset/PCH. Shuttle water to fireline.','command');
      // Scouts and reaper are already airborne (pre-detection patrol)
      ['drone_scout','drone_reaper','drone_relay'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      agentSend('drones','drone_scout','VECTOR: All scouts redirect to fire origin. Confirm perimeter.','command');
      agentSend('drones','drone_reaper','MQ-9: Maintain overhead ISR at 25kft. Downlink thermal to SIT.','command');
      icsPhase='initial';
    }
    // Report resource dispatch status to ops chief if active
    if(agents.ops_chief.active&&!hasSent('dispatch','ops_status')){
      markSent('dispatch','ops_status');
      agentSend('dispatch','ops_chief',`Resource dispatch: 3 engines en route (ETA 8min), heli airborne (ETA 12min), tender staged`,'intel');
    }
  },

  // ── INCIDENT COMMANDER: Assumes command, sets objectives ──
  ic(a,dt){
    a.tickInterval=5;
    const dispatchMsg=lastFrom('ic','dispatch');
    if(dispatchMsg&&!hasSent('ic','assume_command')){
      markSent('ic','assume_command');
      showBanner('INCIDENT COMMANDER ASSIGNED','Engine 51 Captain assumes command — establishes ICS');
      // IC activates Safety Officer immediately (per ICS protocol)
      agents.safety.active=true;litNodes.add('safety');
      agentSend('ic','safety',`SIZE-UP: Wind-driven brush fire, running uphill. ROS HIGH. Verify LCES for all incoming crews.`,'command');
      // In IA, IC IS the Ops Chief (same person). Direct tactical orders from IC.
      // Separate Ops Chief only activated on EA transition.
      agentSend('ic','engines',`IC/OPS DIRECT: E51+E52 direct attack right flank. E53 structure standby Oak Ridge Dr. Pump-and-roll.`,'command');
      if(agents.heli.active)agentSend('ic','heli',`IC/OPS DIRECT: Bucket drops on fire head. Dip site: lake 2.1mi south.`,'command');
    }

    // Monitor situation and escalate
    // IA → EA transition: fire exceeds 10 acres or IA capability
    if(icsPhase==='initial'&&FIRE.area>10&&!hasSent('ic','ea_order')){
      markSent('ic','ea_order');
      icsPhase='extended';
      showBanner('EXTENDED ATTACK ORDERED','Fire exceeding IA capability — additional resources requested');
      // EA: IC delegates to separate Ops Chief (new person assumes role)
      ['ops_chief','plan_chief','fire_branch','air_ops','div_alpha','fban','sit_unit','atgs'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      // Tactical resources ordered but have ETAs
      ['hotshots','dozer','seat','lead_plane','vlat','hand_crew'].forEach(id=>{
        agents[id].active=true;litNodes.add(id);
        agents[id].state.eta=simTime+Math.round((10+Math.random()*20)*60);
        agents[id].state.enRoute=true;
      });
      // Individual units for EA resources
      ['ihc_8','hc_2','hc_5','dozer_1','vlat_1','seat_1','lead_1'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      agentSend('ops_chief','ihc_8','DEPLOY: IHC-8, hike in from Malibu Canyon. Hand line construction on south flank.','command');
      agentSend('ops_chief','hc_2','DEPLOY: HC-2, support IHC-8. Cold trailing and mop-up behind main line.','command');
      agentSend('ops_chief','hc_5','DEPLOY: HC-5, from Topanga. Anchor point construction at ridge saddle.','command');
      agentSend('ops_chief','dozer_1','DEPLOY: DZ-1 Cat D8, cut firebreak along ridge road. 10ft minimum width.','command');
      agentSend('air_ops','vlat_1','LAUNCH: DC-10 VLAT AT-1. Retardant line ahead of fire head. Lead plane will mark.','command');
      agentSend('air_ops','seat_1','LAUNCH: SEAT SE-1. Flank drops. Fast turnaround. Coordinate with ATGS.','command');
      agentSend('air_ops','lead_1','LAUNCH: Lead Plane LP-1. Scout drop zone, mark approach for VLAT.','command');
      // Additional drone types for EA
      ['drone_mapper','drone_safety'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      agentSend('drones','drone_mapper','LAUNCH: eBee mappers for systematic perimeter mapping. Grid pattern.','command');
      agentSend('drones','drone_safety','LAUNCH: Mavic 3T safety overwatch. Monitor crew positions via IR.','command');
      // AI agents come online
      ['ai_overwatch','ai_predict','ai_swarm','ai_deploy'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      agentSend('ic','ops_chief',`YOU ARE NOW OPS SECTION CHIEF. Establish Fire Branch + Air Ops. Divisions needed. IC retains strategic authority.`,'command');
      agentSend('ic','plan_chief',`PLANNING: Extended Attack authorized. Situation assessment and fire behavior prediction needed immediately.`,'command');
      // UAS fleet control active
      agents.drones.active=true;litNodes.add('drones');
      showBanner('FIRESIGHT AI AGENTS ONLINE','OVERWATCH, PREDICT, SWARM, DEPLOY agents initializing');
    }

    // EA → Crisis/Type 1: structures threatened or wind shift
    if(icsPhase==='extended'&&(FIRE.threatenedStructures>20||FIRE.windShifted)&&!hasSent('ic','crisis_order')){
      markSent('ic','crisis_order');
      icsPhase='crisis';
      showBanner('TYPE 1 ESCALATION','Structures threatened — evacuation ordered');
      ['pio','le_branch','struct_group','struct_eng','ai_evac','genasys','traffic','div_bravo'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      // Struct engine + IGNIS drones for crisis
      ['struct_19','drone_ignis','drone_suppress'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      agentSend('struct_group','struct_19','DEPLOY: SP-19, structure triage in threat zone. Foam/gel priority structures.','command');
      agentSend('drones','drone_ignis','LAUNCH: IGNIS M600 drones. Backfire ops authorized. Dragon eggs on south containment.','command');
      agentSend('drones','drone_suppress','LAUNCH: FireSwarm Thunder. Autonomous water drops on hot spots.','command');
      agentSend('ic','pio',`ISSUE EVACUATION WARNING: Zones OR-1, OR-2, OR-3. Press briefing in 30 min.`,'command');
      agentSend('ic','le_branch',`EVACUATION ORDER: Zones OR-1, OR-2 MANDATORY. Zone OR-3 WARNING. Door-to-door.`,'command');
      agentSend('ic','ops_chief',`STRUCTURE PROTECTION: Activate Struct Group. Triage all structures in threat zone.`,'command');
    }

    // Crisis → Full ICS: large incident
    if(icsPhase==='crisis'&&FIRE.area>40&&!hasSent('ic','full_ics')){
      markSent('ic','full_ics');
      icsPhase='full';
      showBanner('FULL ICS — TYPE 1 INCIDENT','All sections staffed — mutual aid requested');
      ['log_chief','fin_chief','iroc','comms','medical','liaison','res_unit','nws'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
      agentSend('ic','log_chief',`FULL ACTIVATION: Comms unit needed (3 freq systems). Medical standby. Supply chain for 200+ personnel.`,'command');
      agentSend('ic','liaison',`COORDINATE: County OES, Red Cross, utility companies, school district.`,'command');
    }

    // Process OVERWATCH decision points
    const owMsg=agents.ic.inbox.filter(m=>m.from==='ai_overwatch'&&m.msg.includes('DECISION POINT'));
    if(owMsg.length>0&&!hasSent('ic','dp_'+Math.floor(simTime/30))){
      markSent('ic','dp_'+Math.floor(simTime/30));
      // IC makes decision based on recommendation
      agentSend('ic','ops_chief',`IC DECISION: Approved OVERWATCH recommendation. Execute tactical adjustment.`,'command');
    }
  },

  // ── SAFETY OFFICER: Monitors safety, authority to STOP ──
  safety(a,dt){
    a.tickInterval=6;
    if(!a.active)return;
    // Check Watch Out situations
    const watchOuts=[];
    if(FIRE.windShifted)watchOuts.push('#15: Wind increase/change');
    if(FIRE.spots.length>0)watchOuts.push('#16: Frequent spot fires');
    if(FIRE.intensity>7)watchOuts.push('#14: Weather hotter/drier');
    if(FIRE.threatenedStructures>0)watchOuts.push('#10: Attempt structure protection');

    if(watchOuts.length>0&&simTime-a.state.lastSafetyCheck>15){
      a.state.lastSafetyCheck=simTime;
      const isCritical=FIRE.windShifted||FIRE.intensity>8;
      if(isCritical){
        // IMMEDIATE STOP AUTHORITY — Safety bypasses chain of command for life safety
        if(agents.hotshots.active)agentSend('safety','hotshots',`SAFETY STOP ORDER: Verify escape routes NOW. Wind shift active. No exceptions.`,'safety');
        if(agents.hand_crew.active)agentSend('safety','hand_crew',`SAFETY STOP ORDER: Halt operations until LCES reconfirmed. Crew safety > containment.`,'safety');
        if(agents.engines.active)agentSend('safety','engines',`SAFETY: All engines verify escape routes. Watch Out #15 active.`,'safety');
      }
      agentSend('safety','ops_chief',`WATCH OUT: ${watchOuts.join(', ')}. ${isCritical?'STOP ORDERS ISSUED to ground crews.':'ALL crews verify LCES.'}`,'safety');
      agentSend('safety','ic',`SAFETY STATUS: ${watchOuts.length} Watch Out situations active. ${isCritical?'STOP ORDERS ISSUED — crews rechecking LCES.':''}`,'safety');
    }

    // LCES check on hotshots/hand crews
    if(FIRE.windShifted&&agents.hotshots.active&&!hasSent('safety','lces_wind')){
      markSent('safety','lces_wind');
      agentSend('safety','hotshots',`MANDATORY LCES CHECK: Wind shift active. Confirm escape route and safety zone NOW.`,'safety');
      if(agents.hand_crew.active)agentSend('safety','hand_crew',`LCES RECHECK: Wind shift — verify escape routes immediately.`,'safety');
    }

    // If drones report crew safety concern
    const droneAlert=agents.safety.inbox.find(m=>m.from==='ai_swarm'&&m.msg.includes('CREW SAFETY'));
    if(droneAlert&&!hasSent('safety','drone_safety')){
      markSent('safety','drone_safety');
      agentSend('safety','ic',`SAFETY ALERT: Drone overwatch reports crew safety concern — verifying escape routes.`,'safety');
    }
  },

  // ── OPERATIONS SECTION CHIEF ──
  ops_chief(a,dt){
    a.tickInterval=5;
    if(!a.active)return;
    // In IA, IC handles ops directly — Ops Chief only active in EA+
    if(icsPhase==='initial')return; // IC is still acting as Ops Chief

    // EA mode: establish divisions
    if(icsPhase==='extended'&&agents.fire_branch.active&&!hasSent('ops_chief','ea_branches')){
      markSent('ops_chief','ea_branches');
      agentSend('ops_chief','fire_branch',`BRANCH ORDER: Assume ground suppression. Division Alpha on head. Engines under divisions.`,'command');
      agentSend('ops_chief','air_ops',`AIR OPS: Coordinate all aircraft. VLAT inbound. SEAT ready. Deconflict with drones.`,'command');
    }

    // Process FBAN fire behavior brief
    const fbanBrief=lastFrom('ops_chief','fban');
    if(fbanBrief&&fbanBrief.t>simTime-20&&!hasSent('ops_chief','fban_resp_'+Math.floor(simTime/30))){
      markSent('ops_chief','fban_resp_'+Math.floor(simTime/30));
      if(FIRE.windShifted){
        agentSend('ops_chief','div_alpha',`FBAN ADVISORY: Wind shift redirecting head. Reposition for east flank defense.`,'command');
        if(agents.div_bravo.active)agentSend('ops_chief','div_bravo',`URGENT: East flank now primary threat. Accelerate fireline construction.`,'command');
      }
    }

    // Periodic sitrep to IC
    if(simTime-a.state.lastSitrep>20){
      a.state.lastSitrep=simTime;
      const contain=Math.round(FIRE.containment);
      agentSend('ops_chief','ic',`OPS SITREP: ${Math.round(FIRE.area)} acres, ${contain}% contained. ROS ${Math.round(FIRE.ros)} ch/hr. ${FIRE.spots.length} spot fires. ${FIRE.threatenedStructures} structures at risk.`,'intel');
      if(agents.plan_chief.active)agentSend('ops_chief','plan_chief',`Ops situation: ${Math.round(FIRE.area)} acres, ${contain}% contained.`,'intel');
    }

    // Process AI DEPLOY recommendations
    const deployRec=lastFrom('ops_chief','ai_deploy');
    if(deployRec&&deployRec.t>simTime-15&&!hasSent('ops_chief','deploy_act_'+Math.floor(simTime/25))){
      markSent('ops_chief','deploy_act_'+Math.floor(simTime/25));
      // Ops Chief validates and relays to tactical units
      if(agents.engines.active)agentSend('ops_chief','engines',`REPOSITION per fire prediction: adjust to current fire behavior.`,'command');
    }
  },

  // ── FIRE BRANCH ──
  fire_branch(a,dt){
    a.tickInterval=7;
    if(!a.active)return;

// Zoom/Pan state
let viewScale=1,viewX=0,viewY=0,isPanning=false,panStartX=0,panStartY=0;
canvas.addEventListener('wheel',function(ev){
  ev.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  // World coords under mouse before zoom
  const wx=(mx-viewX)/viewScale,wy=(my-viewY)/viewScale;
  const delta=ev.deltaY>0?0.9:1.1;
  viewScale=Math.max(0.3,Math.min(5,viewScale*delta));
  // Adjust pan so world point stays under mouse
  viewX=mx-wx*viewScale;viewY=my-wy*viewScale;
},{passive:false});
canvas.addEventListener('mousedown',function(ev){
  if(hoveredNode){/* dragging node, handled below */return}
  isPanning=true;panStartX=ev.clientX-viewX;panStartY=ev.clientY-viewY;
  canvas.style.cursor='grabbing';
});
canvas.addEventListener('mousemove',function(ev){
  if(isPanning&&!dragging){viewX=ev.clientX-panStartX;viewY=ev.clientY-panStartY}
});
canvas.addEventListener('mouseup',function(){isPanning=false;canvas.style.cursor='default'});
// Convert screen coords to world coords for hit-testing
function screen2world(sx,sy){return{x:(sx-viewX)/viewScale,y:(sy-viewY)/viewScale}}
function world2screen(wx,wy){return{x:wx*viewScale+viewX,y:wy*viewScale+viewY}}

function layoutNode(id,n,allIds){
  if(positions[id])return;
  const cx=W/2,cy=H/2;
  const tierY={command:cy-350,staff:cy-200,branch:cy-30,tactical:cy+160,external:cy+380,ai:cy-120};
  const tierNodes=allIds.filter(i=>NODES[i].tier===n.tier);
  const idx=tierNodes.indexOf(id);
  const count=tierNodes.length;
  if(n.tier==='ai'){
    const sp=55;
    positions[id]={x:cx+420+(Math.random()-.5)*15,y:(tierY.ai)+idx*sp-((count-1)*sp/2)+(Math.random()-.5)*8};
  } else if(n.tier==='tactical'){
    // Two rows for many tactical nodes
    const cols=Math.ceil(count/2);
    const row=idx<cols?0:1;
    const colIdx=idx<cols?idx:idx-cols;
    const colCount=row===0?cols:count-cols;
    const spacing=Math.min(100,W*.85/colCount);
    const startX=cx-(colCount-1)*spacing/2;
    positions[id]={x:startX+colIdx*spacing+(Math.random()-.5)*10,y:tierY.tactical+row*70+(Math.random()-.5)*10};
  } else {
    const spacing=Math.min(130,W*.85/count);
    const startX=cx-(count-1)*spacing/2;
    positions[id]={x:startX+idx*spacing+(Math.random()-.5)*12,y:tierY[n.tier]+(Math.random()-.5)*12};
  }
  velocities[id]={x:0,y:0};
}

function initLayout(){
  const allIds=Object.keys(NODES);
  for(const id of allIds)layoutNode(id,NODES[id],allIds);
}

// Force-directed physics
function simulate(){
  const damping=0.85,repulsion=8000,attraction=0.003,idealDist=120;
  const ids=Object.keys(NODES);
  for(let i=0;i<ids.length;i++){
    for(let j=i+1;j<ids.length;j++){
      const a=positions[ids[i]],b=positions[ids[j]];
      if(!a||!b)continue;
      let dx=a.x-b.x,dy=a.y-b.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      let f=repulsion/(dist*dist),fx=dx/dist*f,fy=dy/dist*f;
      velocities[ids[i]].x+=fx;velocities[ids[i]].y+=fy;
      velocities[ids[j]].x-=fx;velocities[ids[j]].y-=fy;
    }
  }
  // Attraction along active edges (between lit nodes)
  for(const a of litNodes){
    for(const b of litNodes){
      if(a===b)continue;
      const pa=positions[a],pb=positions[b];
      if(!pa||!pb)continue;
      // Only attract if they share an edge
      const hasEdge=agents[a].inbox.some(m=>m.from===b)||agents[b].inbox.some(m=>m.from===a);
      if(!hasEdge)continue;
      let dx=pb.x-pa.x,dy=pb.y-pa.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      let f=(dist-idealDist)*attraction;
      velocities[a].x+=dx/dist*f;velocities[a].y+=dy/dist*f;
      velocities[b].x-=dx/dist*f;velocities[b].y-=dy/dist*f;
    }
  }
  // Tier gravity
  const cx=W/2,cy=H/2;
  const tierY={command:cy-280,staff:cy-140,branch:cy+20,tactical:cy+160,external:cy+300,ai:cy-60};
  for(const id of ids){
    const n=NODES[id];if(!positions[id])continue;
    velocities[id].y+=(tierY[n.tier]-positions[id].y)*0.01;
    if(n.tier==='ai')velocities[id].x+=(cx+380-positions[id].x)*0.008;
    else velocities[id].x+=(cx-positions[id].x)*0.001;
    velocities[id].x*=damping;velocities[id].y*=damping;
    positions[id].x+=velocities[id].x;positions[id].y+=velocities[id].y;
    positions[id].x=Math.max(40,Math.min(W-40,positions[id].x));
    positions[id].y=Math.max(90,Math.min(H-40,positions[id].y));
  }
}

  ['struct_group','struct_eng'],
  // Air Ops → Aircraft
  ['air_ops','atgs'],['air_ops','drones'],
  ['atgs','vlat'],['atgs','seat'],['atgs','lead_plane'],['atgs','heli'],
  // Drones → types
  ['drones','drone_scout'],['drones','drone_mapper'],['drones','drone_reaper'],
  ['drones','drone_relay'],['drones','drone_safety'],['drones','drone_ignis'],['drones','drone_suppress'],
  // Plan → units
  ['plan_chief','sit_unit'],['plan_chief','fban'],['plan_chief','res_unit'],
  // Log → units
  ['log_chief','comms'],['log_chief','medical'],
  // Individual units
  ['engines','eng_69a'],['engines','eng_69b'],['engines','eng_23'],
  ['tender','tender_71'],['heli','heli_1'],['vlat','vlat_1'],['seat','seat_1'],
  ['lead_plane','lead_1'],['hotshots','ihc_8'],['hand_crew','hc_2'],['hand_crew','hc_5'],
  ['dozer','dozer_1'],['struct_eng','struct_19'],
  // External
  ['dispatch','engines'],['dispatch','heli'],['dispatch','tender'],
  ['raws','fban'],['raws','ai_predict'],['satellite','sit_unit'],['satellite','ai_predict'],
  ['alert_cam','dispatch'],
  // Law enforcement
  ['le_branch','traffic'],['le_branch','genasys'],
  // AI agents → their domains
  ['ai_overwatch','ai_predict'],['ai_overwatch','ai_swarm'],['ai_overwatch','ai_evac'],['ai_overwatch','ai_deploy'],
  ['ai_swarm','drones'],['ai_deploy','ops_chief'],['ai_evac','le_branch'],['ai_predict','fban'],
  // IROC/NWS
  ['iroc','log_chief'],['nws','fban'],['firis','sit_unit'],
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function draw(){
  frame++;
  const now=performance.now();
  if(playing){
    const dt=(now-lastFrameTime)/1000*simSpeed;
    simTime+=dt;
    if(!externalMode){
      // Standalone mode: run internal fire + agent simulation
      FIRE.tick(dt,simTime);
      for(const[id,a] of Object.entries(agents)){
        if(!a.active)continue;
        a.cooldown-=dt;
        if(a.cooldown<=0){
          a.cooldown=a.tickInterval;
          if(AGENT_TICK[id])AGENT_TICK[id](a,dt);
        }
      }
    }
  }
  lastFrameTime=now;

  ctx.fillStyle='#0A0E17';ctx.fillRect(0,0,W,H);
  simulate();

  // Apply zoom/pan transform
  ctx.save();
  ctx.translate(viewX,viewY);
  ctx.scale(viewScale,viewScale);

  const simStarted=simTime>0;

  // Draw fire perimeter on canvas (small indicator in corner)
  if(FIRE.perimeter.length>0){
    const fw=150,fh=150,fx=W/2-fw/2,fy=H-fh-60;
    ctx.fillStyle='#111827';ctx.fillRect(fx-2,fy-2,fw+4,fh+4);
    ctx.strokeStyle='#1E2636';ctx.strokeRect(fx-2,fy-2,fw+4,fh+4);
    // Fire perimeter
    ctx.beginPath();
    for(let i=0;i<FIRE.perimeter.length;i++){
      const px=fx+(FIRE.perimeter[i].x-0.3)*fw/0.5;
      const py=fy+(FIRE.perimeter[i].y-0.1)*fh/0.5;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.fillStyle='#EF444440';ctx.fill();
    ctx.strokeStyle='#EF4444';ctx.lineWidth=1.5;ctx.stroke();
    // Community
    const cx2=fx+(FIRE.community.x-0.3)*fw/0.5,cy2=fy+(FIRE.community.y-0.1)*fh/0.5;
    ctx.fillStyle='#22D3EE';ctx.fillRect(cx2-3,cy2-3,6,6);
    ctx.fillStyle='#22D3EE80';ctx.font='7px sans-serif';ctx.textAlign='center';
    ctx.fillText('Oak Ridge',cx2,cy2+12);
    // Spot fires
    for(const s of FIRE.spots){
      const sx=fx+(s.x-0.3)*fw/0.5,sy=fy+(s.y-0.1)*fh/0.5;
      ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fillStyle='#FBBF24';ctx.fill();
    }
    // Label
    ctx.fillStyle='#64748B';ctx.font='8px sans-serif';ctx.textAlign='center';
    ctx.fillText('FIRE MAP',fx+fw/2,fy-6);
  }

  // Collect active edges (between nodes that have communicated)
  const activeEdgeSet=new Set();
  for(const[id,a] of Object.entries(agents)){
    if(!a.active)continue;
    for(const m of a.inbox){
      if(litNodes.has(m.from)&&litNodes.has(id)){
        activeEdgeSet.add(m.from+'→'+id);
      }
    }
  }

  // Draw structural hierarchy edges (always visible, very faint when inactive)
  for(const[from,to] of ICS_HIERARCHY){
    const a=positions[from],b=positions[to];
    if(!a||!b)continue;
    const bothActive=litNodes.has(from)&&litNodes.has(to);
    const isMessageEdge=activeEdgeSet.has(from+'→'+to)||activeEdgeSet.has(to+'→'+from);
    if(isMessageEdge)continue; // drawn below with color
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=bothActive?'rgba(100,120,150,0.15)':'rgba(30,38,54,0.12)';
    ctx.lineWidth=0.5;ctx.stroke();
  }

  // Draw active message edges (faint, glowy)
  for(const key of activeEdgeSet){
    const[from,to]=key.split('→');
    const a=positions[from],b=positions[to];
    if(!a||!b)continue;
    const lastMsg=agents[to]?.inbox.find(m=>m.from===from);
    const tc=TYPE_COLORS[lastMsg?.type]||'#1E2636';
    ctx.save();
    ctx.shadowColor=tc;
    ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=tc+'30';ctx.lineWidth=0.8;ctx.stroke();
    ctx.restore();
  }

  // Draw particles (small, glowy)
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.progress+=p.speed;
    if(p.progress>=1){particles.splice(i,1);continue}
    const a=positions[p.from],b=positions[p.to];
    if(!a||!b){particles.splice(i,1);continue}
    if(p.progress<0)continue;
    const x=a.x+(b.x-a.x)*p.progress,y=a.y+(b.y-a.y)*p.progress;
    const alpha=p.progress<0.1?p.progress*10:p.progress>0.9?(1-p.progress)*10:1;
    ctx.save();
    ctx.shadowColor=p.color;
    ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color+Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.fill();
    ctx.restore();
  }

  // Draw nodes
  for(const id of Object.keys(NODES)){
    const n=NODES[id],pos=positions[id];
    if(!n||!pos)continue;
    const isHovered=hoveredNode===id;
    const isLit=litNodes.has(id);
    const r=n.size*(isHovered?1.3:1);

    if(isLit){
      // Active node: glow + color
      ctx.save();
      ctx.shadowColor=n.color;
      ctx.shadowBlur=12;
      ctx.beginPath();ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
      ctx.fillStyle=n.color+(isHovered?'35':'18');ctx.fill();
      ctx.strokeStyle=n.color+(isHovered?'CC':'66');
      ctx.lineWidth=isHovered?1.5:0.8;ctx.stroke();
      ctx.restore();
      if(n.tier==='ai'){
        ctx.setLineDash([2,2]);ctx.beginPath();ctx.arc(pos.x,pos.y,r+3,0,Math.PI*2);
        ctx.strokeStyle=n.color+'30';ctx.lineWidth=0.5;ctx.stroke();ctx.setLineDash([]);
      }
      ctx.fillStyle=isHovered?'#FFFFFF':n.color;
      ctx.font=`${isHovered?'bold ':''}${r<14?7:9}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.short,pos.x,pos.y);
      if(isHovered||r>=22){
        ctx.fillStyle='#4A5568';ctx.font='6px -apple-system,sans-serif';
        ctx.fillText(n.label.length>25?n.label.substring(0,22)+'...':n.label,pos.x,pos.y+r+8);
      }
    } else {
      // Inactive node: greyed out, dim
      ctx.beginPath();ctx.arc(pos.x,pos.y,r*0.6,0,Math.PI*2);
      ctx.fillStyle='rgba(20,26,40,0.3)';ctx.fill();
      ctx.strokeStyle='rgba(40,50,70,0.25)';ctx.lineWidth=0.4;ctx.stroke();
      ctx.fillStyle='rgba(55,65,85,0.5)';
      ctx.font=`${r<14?6:7}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.short,pos.x,pos.y);
    }
  }

  // Tier labels
  const cx=W/2;
  ctx.fillStyle='rgba(30,38,54,0.5)';ctx.font='bold 8px -apple-system,sans-serif';ctx.textAlign='left';
  const tierLabels={command:'COMMAND',staff:'GENERAL STAFF',branch:'BRANCHES / DIVISIONS',tactical:'TACTICAL RESOURCES',external:'EXTERNAL SYSTEMS',ai:'AI AGENTS'};
  const tierY2={command:H/2-350,staff:H/2-200,branch:H/2-30,tactical:H/2+160,external:H/2+380,ai:H/2-120};
  for(const[t,label]of Object.entries(tierLabels)){
    const y=tierY2[t]-2;
    if(t==='ai'){
      ctx.fillText(label,cx+300,y);
      ctx.setLineDash([4,6]);ctx.beginPath();ctx.moveTo(cx+280,tierY2.command-20);
      ctx.lineTo(cx+280,tierY2.external+30);ctx.strokeStyle='#F472B620';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
    } else ctx.fillText(label,30,y);
  }

  // Restore from zoom/pan transform (UI elements drawn in screen space)
  ctx.restore();

  // Update stats
  if(frame%20===0){
    document.getElementById('s-time').textContent=formatSimTime(simTime);
    document.getElementById('s-acres').textContent=Math.round(FIRE.area*10)/10;
    document.getElementById('s-ros').textContent=Math.round(FIRE.ros);
    document.getElementById('s-contain').textContent=Math.round(FIRE.containment)+'%';
    document.getElementById('s-nodes').textContent=litNodes.size;
    document.getElementById('s-edges').textContent=activeEdgeSet.size;
    document.getElementById('s-scenario').textContent=
      icsPhase==='standby'?'Standby':icsPhase==='initial'?'Initial Attack':icsPhase==='extended'?'Extended Attack':icsPhase==='crisis'?'Crisis / Type 1':'Full ICS';
    document.getElementById('s-type').textContent=
      icsPhase==='standby'?'--':icsPhase==='initial'?'Type 4':icsPhase==='extended'?'Type 3':icsPhase==='crisis'?'Type 2':'Type 1';
    const wdNames=['N','NE','E','SE','S','SW','W','NW'];
    const wd=wdNames[Math.round(FIRE.getWindDir(simTime)/45)%8];
    document.getElementById('s-wind').textContent=`${wd} ${Math.round(FIRE.getWindSpeed(simTime))}mph`;
    document.getElementById('s-struct').textContent=FIRE.threatenedStructures;
    document.getElementById('timeline-progress').style.width=Math.min(100,simTime/300*100)+'%';
  }

  requestAnimationFrame(draw);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INTERACTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
canvas.addEventListener('mousemove',function(e){
  const smx=e.clientX,smy=e.clientY;
  // Convert screen to world for hit-testing
  const wm=screen2world(smx,smy);
  hoveredNode=null;
  for(const id of Object.keys(NODES)){
    const pos=positions[id];if(!pos)continue;
    if(Math.hypot(pos.x-wm.x,pos.y-wm.y)<(NODES[id].size+8)/viewScale*1.2){hoveredNode=id;break}
  }
  if(hoveredNode){
    const n=NODES[hoveredNode],a=agents[hoveredNode];
    let html=`<div class="tt-title" style="color:${n.color}">${n.label}</div>`;
    html+=`<div class="tt-role">${n.role}</div>`;
    if(a.active){
      html+=`<div class="tt-section"><div class="tt-label">Status: ACTIVE</div></div>`;
      const incoming=a.inbox.slice(-5);
      if(incoming.length){
        html+=`<div class="tt-section"><div class="tt-label">Recent Messages (${a.inbox.length} total)</div>`;
        incoming.forEach(m=>{
          html+=`<div class="tt-flow" style="color:${NODES[m.from]?.color||'#94A3B8'}">← ${NODES[m.from]?.short}: ${m.msg.substring(0,80)}${m.msg.length>80?'...':''}</div>`;
        });
        html+=`</div>`;
      }
    } else {
      html+=`<div class="tt-section"><div class="tt-label">Status: INACTIVE</div><div class="tt-flow">Awaiting activation in ICS chain</div></div>`;
    }
    tooltip.innerHTML=html;tooltip.style.display='block';
    tooltip.style.left=Math.min(smx+16,W-340)+'px';
    tooltip.style.top=Math.max(smy-10,4)+'px';
  } else tooltip.style.display='none';
});

let dragging=null,dragOff={x:0,y:0};
canvas.addEventListener('mousedown',e=>{
  if(hoveredNode){
    dragging=hoveredNode;
    dragOff.x=positions[hoveredNode].x-screen2world(e.clientX,e.clientY).x;
    dragOff.y=positions[hoveredNode].y-screen2world(e.clientX,e.clientY).y;
  }
});
canvas.addEventListener('mousemove',e=>{
  if(dragging&&positions[dragging]){
    const wm=screen2world(e.clientX,e.clientY);
    positions[dragging].x=wm.x+dragOff.x;positions[dragging].y=wm.y+dragOff.y;
    velocities[dragging].x=0;velocities[dragging].y=0;
  }
});
canvas.addEventListener('mouseup',()=>{dragging=null;isPanning=false;canvas.style.cursor='default'});

// ━━ EXTERNAL FIRE STATE (postMessage from parent FireSight app) ━━
let externalMode=false; // true when driven by parent app's fire data
window.addEventListener('message',function(ev){
  if(!ev.data||ev.data.type!=='firesight_fire_state')return;
  const d=ev.data;

  // Reset when fire cleared (parent sends fireDetected=false after post-fire)
  if(externalMode&&!d.fireDetected){
    externalMode=false;
    litNodes=new Set();
    for(const id of Object.keys(agents))initAgent(id);
    icsPhase='standby';
    FIRE.reset();
    particles=[];
    return;
  }

  // First time receiving fire detected: auto-start the sim in external mode
  if(!externalMode&&d.fireDetected){
    externalMode=true;
    // Reset and start in external mode
    litNodes=new Set();
    for(const id of Object.keys(agents))initAgent(id);
    icsPhase='standby';
    FIRE.reset();
    particles=[];
    msgEl.innerHTML='';
    playing=true;
    lastFrameTime=performance.now();
    document.getElementById('play-btn').textContent='PAUSE';
    document.getElementById('play-btn').classList.add('playing');
    // Always-on sensors (scouting drones and external sensors)
    activateSensors();
  }

  // Sync fire state from map view
  if(d.fireDetected){
    // Override FIRE physics with real data from the map
    if(d.area>0)FIRE.area=d.area;
    if(d.ros>0)FIRE.ros=d.ros;
    if(d.intensity>0)FIRE.intensity=d.intensity;
    if(d.containment!==undefined)FIRE.containment=d.containment;
    if(d.windSpeed!==undefined){FIRE.wind.speed=d.windSpeed;FIRE.wind.gustSpeed=d.windSpeed*1.4}
    if(d.windDirection!==undefined)FIRE.wind.dir=d.windDirection;
    if(d.threatenedStructures!==undefined)FIRE.threatenedStructures=d.threatenedStructures;
    if(d.spots)FIRE.spots=d.spots;
    if(d.windShifted!==undefined)FIRE.windShifted=d.windShifted;

    // Seed the fire perimeter if empty (so agents can detect it)
    if(FIRE.perimeter.length===0&&FIRE.area>0){
      for(let i=0;i<16;i++){
        const a=i/16*Math.PI*2;
        FIRE.perimeter.push({x:FIRE.origin.x+Math.cos(a)*0.005,y:FIRE.origin.y+Math.sin(a)*0.005});
      }
    }

    // Sync ICS phase from map
    if(d.icsPhase){
      const phaseMap={standby:'standby',initial:'initial',extended:'extended',crisis:'crisis',full:'full'};
      if(phaseMap[d.icsPhase])icsPhase=phaseMap[d.icsPhase];
    }

    // ━━ SYNC ACTIVE NODES from map view ━━
    // Light up nodes that correspond to actually deployed units/drones on the map
    const allSynced=[...(d.activeUnits||[]),...(d.activeDrones||[]),...(d.activeAI||[])];
    for(const nodeId of allSynced){
      if(NODES[nodeId]&&!agents[nodeId].active){
        agents[nodeId].active=true;
        litNodes.add(nodeId);
        // Spawn particles along hierarchy edges to show activation flow
        for(const [a,b] of ICS_HIERARCHY){
          if(b===nodeId&&litNodes.has(a))spawnMsgParticle(a,b,'command');
          if(a===nodeId&&litNodes.has(b))spawnMsgParticle(a,b,'intel');
        }
      }
    }
    // Also activate structural ICS nodes based on phase
    if(d.icsPhase==='initial'||d.icsPhase==='extended'||d.icsPhase==='crisis'||d.icsPhase==='full'){
      ['ic','safety','dispatch'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }
    if(d.icsPhase==='extended'||d.icsPhase==='crisis'||d.icsPhase==='full'){
      ['ops_chief','plan_chief','fire_branch','air_ops','div_alpha','fban','sit_unit','atgs'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }
    if(d.icsPhase==='crisis'||d.icsPhase==='full'){
      ['pio','le_branch','struct_group','div_bravo','genasys','traffic'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }
    if(d.icsPhase==='full'){
      ['log_chief','fin_chief','iroc','comms','medical','liaison','res_unit','nws'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }

    // In external mode, periodically spawn particles between active nodes for visual life
    if(externalMode&&frame%90===0){
      const activeIds=[...litNodes];
      for(const [a,b] of ICS_HIERARCHY){
        if(litNodes.has(a)&&litNodes.has(b)&&Math.random()<0.3){
          const types=['command','intel','coord','ai'];
          spawnMsgParticle(a,b,types[Math.floor(Math.random()*types.length)]);
        }
      }
    }
  }
});

// Auto-play after 1 second if in standalone mode
setTimeout(() => {
  if (!playing && !externalMode) {
    togglePlay();
  }
}, 1000);

// ━━ INIT ━━
initLayout();
draw();
</script>
