<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICS Wildfire Command Chain — Autonomous Agent Simulation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0E17;color:#E2E8F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw}
#ui,#legend,#stats,#msg-log,#event-banner,#timeline-bar{display:none!important}
canvas{display:block}
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none}
#title-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(10,14,23,.85);border-bottom:1px solid #1E2636;pointer-events:auto}
#title-bar h1{font-size:14px;letter-spacing:1px;color:#A78BFA;font-weight:600}
#title-bar .sub{font-size:10px;color:#64748B;margin-left:12px}
#phase-bar{display:flex;gap:8px;align-items:center}
#phase-bar button{background:#111827;border:1px solid #1E2636;color:#94A3B8;padding:4px 12px;border-radius:4px;font-size:10px;cursor:pointer;pointer-events:auto;transition:all .2s}
#phase-bar button:hover{border-color:#A78BFA;color:#E2E8F0}
#phase-bar button.active{background:#A78BFA20;border-color:#A78BFA;color:#A78BFA}
#legend{position:absolute;bottom:16px;left:16px;background:rgba(17,24,39,.9);border:1px solid #1E2636;border-radius:8px;padding:12px 16px;font-size:9px;pointer-events:auto;max-width:280px}
#legend h3{font-size:10px;color:#A78BFA;margin-bottom:8px;letter-spacing:1px}
.leg-row{display:flex;align-items:center;gap:6px;margin:3px 0;color:#94A3B8}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-line{width:20px;height:2px;flex-shrink:0;border-radius:1px}
#tooltip{position:absolute;display:none;background:rgba(17,24,39,.95);border:1px solid #1E2636;border-radius:6px;padding:10px 14px;font-size:10px;max-width:320px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100}
#tooltip .tt-title{font-size:12px;font-weight:700;margin-bottom:4px}
#tooltip .tt-role{font-size:9px;color:#64748B;margin-bottom:6px}
#tooltip .tt-section{margin-top:6px;padding-top:6px;border-top:1px solid #1E2636}
#tooltip .tt-label{font-size:8px;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
#tooltip .tt-flow{font-size:9px;color:#94A3B8;line-height:1.4}
#stats{position:absolute;top:50px;right:16px;background:rgba(17,24,39,.9);border:1px solid #1E2636;border-radius:8px;padding:12px 16px;font-size:9px;pointer-events:auto;width:220px}
#stats h3{font-size:10px;color:#A78BFA;margin-bottom:8px;letter-spacing:1px}
.stat-row{display:flex;justify-content:space-between;margin:3px 0;color:#94A3B8}
.stat-val{color:#E2E8F0;font-weight:600}
#msg-log{position:absolute;bottom:16px;right:16px;background:rgba(17,24,39,.9);border:1px solid #1E2636;border-radius:8px;padding:12px 16px;font-size:9px;pointer-events:auto;width:380px;max-height:340px;overflow-y:auto}
#msg-log h3{font-size:10px;color:#A78BFA;margin-bottom:8px;letter-spacing:1px}
.msg{padding:4px 0;border-bottom:1px solid #1E263620;line-height:1.3}
.msg-from{font-weight:600;margin-right:4px}
.msg-to{color:#64748B}
.msg-text{color:#94A3B8;display:block;margin-top:1px}
#sim-controls{display:flex;gap:10px;align-items:center;pointer-events:auto}
#sim-controls span{font-size:9px;color:#64748B}
#play-btn{background:#111827;border:1px solid #A78BFA;color:#A78BFA;padding:5px 16px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:1px;transition:all .2s}
#play-btn:hover{background:#A78BFA20}
#play-btn.playing{border-color:#EF4444;color:#EF4444}
#play-btn.playing:hover{background:#EF444420}
#speed-wrap{display:flex;align-items:center;gap:6px}
#speed-slider{-webkit-appearance:none;width:100px;height:4px;border-radius:2px;background:#1E2636;outline:none}
#speed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#A78BFA;cursor:pointer;border:2px solid #0A0E17}
#speed-label{font-size:10px;color:#A78BFA;font-weight:600;min-width:30px}
#timeline-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:#111827;pointer-events:none}
#timeline-progress{height:100%;width:0%;background:linear-gradient(90deg,#A78BFA,#F472B6);transition:width .3s}
#event-banner{position:absolute;top:55px;left:50%;transform:translateX(-50%);background:rgba(17,24,39,.95);border:1px solid #A78BFA40;border-radius:8px;padding:10px 24px;font-size:12px;color:#E2E8F0;pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap;z-index:50;text-align:center}
#event-banner .ev-time{font-size:9px;color:#A78BFA;letter-spacing:1px;margin-bottom:2px}
#event-banner .ev-text{font-size:13px;font-weight:600}
#event-banner .ev-detail{font-size:9px;color:#94A3B8;margin-top:3px}
/* ── IC Decision Prompt ── */
#ic-decision{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:200;pointer-events:auto;min-width:340px;max-width:420px}
#ic-decision .dc-card{background:rgba(10,14,23,.96);border:1px solid #FBBF2480;border-radius:10px;padding:18px 22px;box-shadow:0 0 40px rgba(251,191,36,.15),0 12px 40px rgba(0,0,0,.6)}
#ic-decision .dc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
#ic-decision .dc-icon{width:28px;height:28px;border-radius:50%;background:#FBBF2420;border:1px solid #FBBF2460;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
#ic-decision .dc-tag{font-size:8px;color:#FBBF24;letter-spacing:1.5px;font-weight:700;text-transform:uppercase}
#ic-decision .dc-title{font-size:14px;font-weight:700;color:#E2E8F0;line-height:1.3}
#ic-decision .dc-context{font-size:10px;color:#94A3B8;margin:8px 0 14px;line-height:1.5;border-left:2px solid #FBBF2430;padding-left:10px}
#ic-decision .dc-options{display:flex;flex-direction:column;gap:8px}
#ic-decision .dc-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:6px;border:1px solid #1E2636;background:#111827;cursor:pointer;transition:all .15s;text-align:left}
#ic-decision .dc-opt:hover{border-color:#FBBF2480;background:#FBBF2410}
#ic-decision .dc-opt-key{width:22px;height:22px;border-radius:4px;background:#1E2636;border:1px solid #334155;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#FBBF24;flex-shrink:0}
#ic-decision .dc-opt:hover .dc-opt-key{background:#FBBF2420;border-color:#FBBF24}
#ic-decision .dc-opt-text{font-size:11px;color:#E2E8F0;font-weight:600;line-height:1.3}
#ic-decision .dc-opt-sub{font-size:9px;color:#64748B;margin-top:2px;line-height:1.3}
#ic-decision .dc-timer{height:2px;background:#1E2636;border-radius:1px;margin-top:12px;overflow:hidden}
#ic-decision .dc-timer-bar{height:100%;background:linear-gradient(90deg,#FBBF24,#EF4444);transition:width .5s linear;width:100%}
#ic-decision .dc-from{font-size:9px;color:#64748B;margin-top:8px;text-align:right}
</style>
</head>
<body>
<canvas id="c"></canvas>
<!-- UI panels hidden — graph + tooltip only -->
<div id="ui" style="display:none">
  <div id="title-bar">
    <div style="display:flex;align-items:baseline">
      <h1>ICS WILDFIRE COMMAND CHAIN</h1>
      <span class="sub">Autonomous agent simulation — real ICS protocol</span>
    </div>
    <div id="sim-controls">
      <button id="play-btn" onclick="togglePlay()">PLAY</button>
      <button onclick="resetSim()">RESET</button>
      <div id="speed-wrap">
        <span>SPEED:</span>
        <input type="range" id="speed-slider" min="0.1" max="10" step="0.1" value="1" oninput="setSpeed(this.value)">
        <span id="speed-label">1.0x</span>
      </div>
    </div>
  </div>
</div>
<div id="tooltip"></div>
<div id="legend" style="display:none"></div>
<div id="stats" style="display:none">
  <span class="stat-val" id="s-time">T+0:00</span>
  <span class="stat-val" id="s-acres">0</span>
  <span class="stat-val" id="s-ros">0</span>
  <span class="stat-val" id="s-contain">0%</span>
  <span class="stat-val" id="s-nodes">0</span>
  <span class="stat-val" id="s-edges">0</span>
  <span class="stat-val" id="s-scenario">Standby</span>
  <span class="stat-val" id="s-type">--</span>
  <span class="stat-val" id="s-wind">SW 18mph</span>
  <span class="stat-val" id="s-struct">0</span>
</div>
<div id="msg-log" style="display:none">
  <h3>MESSAGE FLOW</h3>
  <div id="messages"></div>
</div>
<div id="event-banner" style="display:none"><div class="ev-time"></div><div class="ev-text"></div><div class="ev-detail"></div></div>
<div id="timeline-bar" style="display:none"><div id="timeline-progress"></div></div>
<div id="ic-decision"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');
const msgEl=document.getElementById('messages');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;try{if(typeof initLayout==='function'&&NODES&&Object.keys(NODES).length)initLayout();}catch(e){}}
resize();window.addEventListener('resize',resize);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FIRE PHYSICS — Only hardcoded data. Everything else is autonomous.
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FIRE={
  origin:{x:0.62,y:0.38},
  wind:{dir:225,speed:18,gustSpeed:28},
  slope:15,fuelMoisture:3,temp:94,rh:8,
  community:{x:0.42,y:0.22,name:'Oak Ridge',pop:1200,structures:180},
  windShiftTime:70*60,windShiftDir:315,windShiftSpeed:22,windShiftGust:35,
  perimeter:[],area:0,ros:0,intensity:0,containment:0,spots:[],
  threatenedStructures:0,windShifted:false,

  calcROS(ws,slope,fm){
    const R0=8,phiW=0.5*Math.pow(ws/10,1.3),phiS=0.4*Math.pow(Math.tan(slope*Math.PI/180),1.5);
    return R0*(1+phiW+phiS)*Math.max(0.1,1-0.08*fm);
  },
  getWindDir(t){return t>=this.windShiftTime?this.windShiftDir:this.wind.dir},
  getWindSpeed(t){
    const ws=t>=this.windShiftTime?this.windShiftSpeed:this.wind.speed;
    const gs=t>=this.windShiftTime?this.windShiftGust:this.wind.gustSpeed;
    return ws+Math.sin(t*0.3)*(gs-ws)*0.5;
  },
  tick(dt,simT){
    if(dt<=0)return;
    this.windShifted=simT>=this.windShiftTime;
    const wd=this.getWindDir(simT),effWind=this.getWindSpeed(simT);
    this.ros=this.calcROS(effWind,this.slope,this.fuelMoisture);
    this.intensity=Math.min(10,this.ros*0.08*effWind);
    const windRad=(wd+180)*Math.PI/180,hdx=Math.sin(windRad),hdy=-Math.cos(windRad);
    const headRate=this.ros*0.0003*dt,containF=Math.max(0.1,1-this.containment*0.008);
    if(!this.perimeter.length){
      for(let i=0;i<16;i++){const a=i/16*Math.PI*2;this.perimeter.push({x:this.origin.x+Math.cos(a)*0.005,y:this.origin.y+Math.sin(a)*0.005})}
    }
    for(const p of this.perimeter){
      const dx=p.x-this.origin.x,dy=p.y-this.origin.y;
      const dot=dx*hdx+dy*hdy,dist=Math.sqrt(dx*dx+dy*dy)||0.001;
      const rate=dot>0?headRate*(0.3+0.7*Math.abs(dot)/dist):headRate*0.05;
      p.x+=hdx*rate*containF+(Math.random()-.5)*rate*0.1;
      p.y+=hdy*rate*containF+(Math.random()-.5)*rate*0.1;
    }
    let a2=0;for(let i=0;i<this.perimeter.length;i++){const j=(i+1)%this.perimeter.length;a2+=this.perimeter[i].x*this.perimeter[j].y-this.perimeter[j].x*this.perimeter[i].y}
    this.area=Math.abs(a2)*0.5*12000;
    if(this.ros>25&&Math.random()<0.002*dt&&this.spots.length<4){
      const sd=0.02+Math.random()*0.04;
      this.spots.push({x:this.origin.x+hdx*sd+(Math.random()-.5)*0.01,y:this.origin.y+hdy*sd+(Math.random()-.5)*0.01,t:simT,confirmed:false,area:0.1});
    }
    for(const s of this.spots)s.area+=dt*0.0005*this.ros;
    const head=this.getHead(),dc=Math.sqrt((head.x-this.community.x)**2+(head.y-this.community.y)**2);
    this.threatenedStructures=dc<0.15?Math.min(this.community.structures,Math.round((0.15-dc)/0.15*this.community.structures)):0;
  },
  getHead(){
    if(!this.perimeter.length)return this.origin;
    const wr=(this.wind.dir+180)*Math.PI/180,hx=Math.sin(wr),hy=-Math.cos(wr);
    let best=-Infinity,head=this.perimeter[0];
    for(const p of this.perimeter){const d=(p.x-this.origin.x)*hx+(p.y-this.origin.y)*hy;if(d>best){best=d;head=p}}
    return head;
  },
  distTo(x,y){let m=Infinity;for(const p of this.perimeter){const d=Math.hypot(p.x-x,p.y-y);if(d<m)m=d}return m},
  etaMins(x,y){const d=this.distTo(x,y),r=this.ros*0.0003;return r>0?d/r/60:Infinity},
  reset(){this.perimeter=[];this.area=0;this.ros=0;this.intensity=0;this.containment=0;this.spots=[];this.threatenedStructures=0;this.windShifted=false}
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NODE DEFINITIONS — ICS organizational chart
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const NODES={
  // COMMAND
  ic:{label:'Incident Commander',short:'IC',tier:'command',color:'#EF4444',size:28,
    role:'Overall authority. Sets objectives, strategies, priorities. Approves IAP and evacuation orders.'},
  safety:{label:'Safety Officer',short:'SAFETY',tier:'command',color:'#EF4444',size:18,
    role:'Monitors safety. Authority to STOP any unsafe operation immediately. Checks 10 Orders + 18 Watch Outs.'},
  pio:{label:'Public Info Officer',short:'PIO',tier:'command',color:'#EF4444',size:16,
    role:'Media coordination. Community alerts. Single point of contact for press.'},
  liaison:{label:'Liaison Officer',short:'LIAS',tier:'command',color:'#EF4444',size:16,
    role:'Multi-agency coordination. Mutual aid agreements.'},
  // GENERAL STAFF
  ops_chief:{label:'Operations Section Chief',short:'OPS',tier:'staff',color:'#A78BFA',size:24,
    role:'Manages ALL tactical operations. Develops ops portion of IAP. Most resources work under Ops.'},
  plan_chief:{label:'Planning Section Chief',short:'PLAN',tier:'staff',color:'#A78BFA',size:22,
    role:'Situation assessment, fire behavior analysis, resource tracking. Runs P-meeting. Drafts IAP.'},
  log_chief:{label:'Logistics Section Chief',short:'LOG',tier:'staff',color:'#A78BFA',size:20,
    role:'Facilities, services, supplies. Communications infrastructure, medical, food.'},
  fin_chief:{label:'Finance/Admin Chief',short:'FIN',tier:'staff',color:'#A78BFA',size:16,
    role:'Cost tracking, contracts, compensation. Critical for Type 1/2 incidents.'},
  // BRANCHES
  fire_branch:{label:'Fire Suppression Branch',short:'FIRE BR',tier:'branch',color:'#FBBF24',size:18,
    role:'Directs all ground and air suppression operations under Ops Chief.'},
  air_ops:{label:'Air Operations Branch',short:'AIR OPS',tier:'branch',color:'#FBBF24',size:18,
    role:'Coordinates all aircraft: tankers, helicopters, lead planes, drones.'},
  div_alpha:{label:'Division Alpha (Head)',short:'DIV-A',tier:'branch',color:'#FBBF24',size:14,
    role:'Supervises resources attacking the fire head — most aggressive front.'},
  div_bravo:{label:'Division Bravo (Flanks)',short:'DIV-B',tier:'branch',color:'#FBBF24',size:14,
    role:'Fireline construction and holding on flanks.'},
  struct_group:{label:'Structure Protection Group',short:'STRUCT',tier:'branch',color:'#FBBF24',size:14,
    role:'Triage structures. Deploy engines for protection. Bump-and-run.'},
  sit_unit:{label:'Situation Unit',short:'SIT',tier:'branch',color:'#FBBF24',size:14,
    role:'Maintains situation display. Maps, projections, forecasts.'},
  fban:{label:'Fire Behavior Analyst',short:'FBAN',tier:'branch',color:'#FBBF24',size:16,
    role:'Runs fire spread models. Predicts ROS, flame length, spotting. 30-60 min cycle.'},
  res_unit:{label:'Resources Unit',short:'RESU',tier:'branch',color:'#FBBF24',size:12,
    role:'Tracks status and location of all assigned resources.'},
  le_branch:{label:'Law Enforcement Branch',short:'LE BR',tier:'branch',color:'#FBBF24',size:14,
    role:'Executes evacuation orders. Door-to-door. Traffic control.'},
  comms:{label:'Communications Unit',short:'COMMS',tier:'branch',color:'#FBBF24',size:14,
    role:'P25 radio. Manages frequencies, repeaters, interop gateways.'},
  medical:{label:'Medical Unit',short:'MED',tier:'branch',color:'#FBBF24',size:12,
    role:'EMS along fireline and evacuation routes.'},
  // TACTICAL
  engines:{label:'Type 3 Engines (×3)',short:'ENG×3',tier:'tactical',color:'#22D3EE',size:14,
    role:'3-person crew, 500gal. Direct attack with hose lines. Pump-and-roll.'},
  hotshots:{label:'Hotshot Crew (IHC)',short:'IHC',tier:'tactical',color:'#22D3EE',size:14,
    role:'20-person elite. Hand line construction, burnout/backfire with drip torches.'},
  hand_crew:{label:'Type 2 Hand Crew',short:'T2 HC',tier:'tactical',color:'#22D3EE',size:12,
    role:'20-person crew. Manual fireline, mop-up, cold trailing.'},
  dozer:{label:'Dozer (Cat D8)',short:'DZR',tier:'tactical',color:'#22D3EE',size:12,
    role:'Cuts 10-20ft firebreak. Fast but needs road access.'},
  vlat:{label:'VLAT DC-10',short:'VLAT',tier:'tactical',color:'#22D3EE',size:16,
    role:'11,600gal Phos-Chek. Drops AHEAD of fire. 35min turnaround.'},
  seat:{label:'SEAT Air Tractor',short:'SEAT',tier:'tactical',color:'#22D3EE',size:12,
    role:'800gal retardant. Fast turnaround. Flanks and initial attack.'},
  lead_plane:{label:'Lead Plane',short:'LEAD',tier:'tactical',color:'#22D3EE',size:12,
    role:'Scouts drop zone, marks with smoke, guides tanker approach.'},
  heli:{label:'Helitack (Chinook)',short:'HELI',tier:'tactical',color:'#22D3EE',size:14,
    role:'2,600gal Bambi Bucket. Cools hot spots. Crew transport.'},
  tender:{label:'Water Tender',short:'WTR',tier:'tactical',color:'#22D3EE',size:10,
    role:'4,000gal. Shuttles water to engines on fireline.'},
  struct_eng:{label:'Structure Engine',short:'STRC',tier:'tactical',color:'#22D3EE',size:12,
    role:'Structure protection: triage, sprinklers, gel, foam.'},
  atgs:{label:'Air Tactical (OV-10A)',short:'ATGS',tier:'tactical',color:'#22D3EE',size:14,
    role:'Flies at 2000ft. Directs all air ops. Override authority on drones.'},
  drones:{label:'UAS Fleet Control',short:'UAS',tier:'tactical',color:'#22D3EE',size:14,
    role:'Coordinates all drone operations. Deconflicts airspace with manned aircraft.'},
  // Individual drone types — activated as deployed
  drone_scout:{label:'DFR Scouts (Skydio/M30T)',short:'SCOUT',tier:'tactical',color:'#22D3EE',size:11,
    role:'DJI M30T + Skydio X10. 40mph. Thermal+visual. First on-scene fire confirmation.'},
  drone_mapper:{label:'Mapping Fixed-Wing (eBee)',short:'MAPPER',tier:'tactical',color:'#60A5FA',size:11,
    role:'senseFly eBee X / JOUAV CW-25. Systematic grid mapping, perimeter tracking.'},
  drone_reaper:{label:'MQ-9 Reaper (HALE ISR)',short:'MQ-9',tier:'tactical',color:'#E2E8F0',size:13,
    role:'General Atomics MQ-9. 230mph at 25kft. 27hr endurance. Wide-area persistent surveillance.'},
  drone_safety:{label:'Safety Overwatch (Mavic 3T)',short:'SAFE-D',tier:'tactical',color:'#34D399',size:10,
    role:'DJI Mavic 3T. Monitors crew positions. Verifies escape routes. Flags hazards.'},
  drone_relay:{label:'Comms Relay UAS',short:'RELAY',tier:'tactical',color:'#A78BFA',size:10,
    role:'Airborne repeater. Bridges P25 radio in canyon dead zones.'},
  drone_ignis:{label:'IGNIS Aerial Ignition (M600)',short:'IGNIS',tier:'tactical',color:'#F97316',size:11,
    role:'DJI M600 + IGNIS II. Dragon eggs (KMnO4 spheres). Backfire ops. 10-120 per min.'},
  drone_suppress:{label:'FireSwarm Thunder (Heavy-lift)',short:'F-SWM',tier:'tactical',color:'#F472B6',size:11,
    role:'Heavy-lift. 350kg water/retardant payload. Autonomous pickup and drop.'},

// AUTONOMOUS AGENT ENGINE
// Each agent has: state, inbox, cooldowns, and a tick() function
// that makes independent decisions based on what it knows
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const agents={};
const messageQueue=[];
let litNodes=new Set();
let icsPhase='standby'; // standby → initial → extended → crisis → full

function initAgent(id){
  agents[id]={
    active:false,
    lastTick:0,
    cooldown:0, // seconds until next action
    tickInterval:5, // how often this agent thinks (seconds)
    inbox:[],
    state:{},
    sent:{} // track what was already reported (dedup)
  };
}
for(const id of Object.keys(NODES))initAgent(id);

// Send a message from one agent to another
let _msgBatch=[];
let _msgFlushTimer=null;
// Dedup: track recent messages to suppress near-identical repeats
let _recentMsgs=[];  // {from,to,msg,t} last 60 sim-seconds
function _isDuplicate(from,to,msg){
  const now=simTime;
  // Purge old entries (>30 sim-seconds)
  _recentMsgs=_recentMsgs.filter(r=>now-r.t<30);
  // Check for same from+to with similar content
  for(const r of _recentMsgs){
    if(r.from===from&&r.to===to){
      // Compare first 40 chars — if same prefix, it's a repeated status update
      if(msg.slice(0,40)===r.msg.slice(0,40))return true;
    }
  }
  _recentMsgs.push({from,to,msg,t:now});
  if(_recentMsgs.length>200)_recentMsgs.splice(0,100);
  return false;
}
function _flushMsgBatch(){
  _msgFlushTimer=null;
  if(!_msgBatch.length)return;
  // Send ALL messages, don't drop any
  const batch=_msgBatch.splice(0);
  try{
    window.parent.postMessage({type:'ics_message_batch',messages:batch},'*');
  }catch(e){console.warn('postMessage fail',e)}
}
function agentSend(from,to,msg,type){
  if(!agents[from]||!agents[to])return;
  if(!agents[to].active){agents[to].active=true;litNodes.add(to)}
  if(!agents[from].active){agents[from].active=true;litNodes.add(from)}
  const mtype=type||'intel';
  const inbox=agents[to].inbox;
  inbox.push({from,msg,t:simTime,type:mtype});
  if(inbox.length>20)inbox.splice(0,inbox.length-20);
  messageQueue.push({from,to,msg,type:mtype,t:simTime});
  if(messageQueue.length>30)messageQueue.splice(0,messageQueue.length-30);
  spawnMsgParticle(from,to,mtype);
  // Suppress near-duplicate status updates (but always forward safety/command)
  if(mtype==='intel'&&_isDuplicate(from,to,msg))return;
  // Forward to parent for comms log
  const fromLabel=NODES[from]?.short||from;
  const toLabel=NODES[to]?.short||to;
  _msgBatch.push({from:fromLabel,to:toLabel,fromId:from,toId:to,msg,type:mtype,t:formatSimTime(simTime)});
  if(!_msgFlushTimer)_msgFlushTimer=setTimeout(_flushMsgBatch,400);
}

function showBanner(text,detail){
  const b=document.getElementById('event-banner');
  b.querySelector('.ev-time').textContent=formatSimTime(simTime);
  b.querySelector('.ev-text').textContent=text;
  b.querySelector('.ev-detail').textContent=detail||'';
  b.style.opacity='1';
  clearTimeout(b._t);
  b._t=setTimeout(()=>{b.style.opacity='0'},5000/Math.max(1,simSpeed));
}

let activeDecision=null;
let decisionHistory={};
let decisionTimer=0;
let lastDecisionRealTime=0; // real-time of last decision shown (ms)
const DECISION_TIMEOUT=45; // sim-seconds to decide before auto-pick
const DECISION_COOLDOWN_MS=10000; // minimum 10 real seconds between decisions

function showDecision(dec){
  if(activeDecision)return;
  // Enforce real-time cooldown
  if(Date.now()-lastDecisionRealTime<DECISION_COOLDOWN_MS)return;
  activeDecision=dec;
  decisionTimer=simTime;
  lastDecisionRealTime=Date.now();
  // Send to parent app for overlay on map view
  try{
    window.parent.postMessage({
      type:'ic_decision_prompt',
      id:dec.id,
      from:dec.from,
      title:dec.title,
      context:dec.context,
      options:dec.options.map(o=>({key:o.key,text:o.text,sub:o.sub})),
      simTime:formatSimTime(simTime),
    },'*');
  }catch(e){}
  // In embedded mode, parent app handles the UI overlay — skip in-iframe DOM
  if(externalMode)return;
  const el=document.getElementById('ic-decision');
  el.innerHTML=`<div class="dc-card">
    <div class="dc-header">
      <div class="dc-icon">&#9888;</div>
      <div><div class="dc-tag">IC DECISION REQUIRED</div><div class="dc-title">${dec.title}</div></div>
    </div>
    <div class="dc-context">${dec.context}</div>
    <div class="dc-options">${dec.options.map((o,i)=>`
      <div class="dc-opt" onclick="pickDecision(${i})">
        <div class="dc-opt-key">${o.key}</div>
        <div><div class="dc-opt-text">${o.text}</div><div class="dc-opt-sub">${o.sub}</div></div>
      </div>`).join('')}
    </div>
    <div class="dc-timer"><div class="dc-timer-bar" id="dc-timer-bar"></div></div>
    <div class="dc-from">Requested by ${dec.from} at ${formatSimTime(simTime)}</div>
  </div>`;
  el.style.display='block';
  agentSend('ai_overwatch','ic',`DECISION POINT: ${dec.title} — Awaiting IC input.`,'ai');
}

function pickDecision(idx){
  if(!activeDecision)return;
  const opt=activeDecision.options[idx];
  decisionHistory[activeDecision.id]=true;
  // Snapshot FIRE state before fx
  const before={containment:FIRE.containment,ros:FIRE.ros,intensity:FIRE.intensity,threatenedStructures:FIRE.threatenedStructures,spots:FIRE.spots.length};
  opt.fx();
  // Compute deltas to send to parent map
  const effects={
    containmentDelta:FIRE.containment-before.containment,
    rosMultiplier:before.ros>0?FIRE.ros/before.ros:1,
    intensityDelta:FIRE.intensity-before.intensity,
    threatenedDelta:FIRE.threatenedStructures-before.threatenedStructures,
    spotReduction:before.spots>FIRE.spots.length?before.spots-FIRE.spots.length:0,
  };
  showBanner('IC DECISION: '+opt.text, activeDecision.title);
  agentSend('ic','ai_overwatch',`DECISION MADE: "${opt.text}" — executing.`,'command');
  // Notify parent with effects so map can react
  try{window.parent.postMessage({type:'ic_decision_resolved',id:activeDecision.id,choice:opt.text,decisionId:activeDecision.id,effects},'*')}catch(e){}
  const dcEl=document.getElementById('ic-decision');
  if(dcEl)dcEl.style.display='none';
  activeDecision=null;
}

function updateDecisionTimer(){
  if(!activeDecision)return;
  const elapsed=simTime-decisionTimer;
  const pct=Math.max(0,1-elapsed/DECISION_TIMEOUT)*100;
  const bar=document.getElementById('dc-timer-bar');
  if(bar)bar.style.width=pct+'%';
  // Send timer update to parent
  if(frame%10===0){
    try{window.parent.postMessage({type:'ic_decision_timer',pct},'*')}catch(e){}
  }
  if(elapsed>=DECISION_TIMEOUT)pickDecision(0);
}

function checkDecisionTriggers(){
  if(activeDecision)return;
  if(Date.now()-lastDecisionRealTime<DECISION_COOLDOWN_MS)return;
  for(const dec of IC_DECISIONS){
    if(dec.trigger(decisionHistory)){
      showDecision(dec);
      return;
    }
  }
}

// Listen for messages from parent app
let externalHighlight=null; // node ID highlighted from map hover
window.addEventListener('message',function(ev){
  if(!ev.data)return;
  if(ev.data.type==='ic_decision_response'&&activeDecision){
    pickDecision(ev.data.idx);
  }
  // Map hover → highlight corresponding ICS node
  if(ev.data.type==='map_hover'){
    externalHighlight=ev.data.nodeId||null;
  }
});

// Keyboard shortcuts for decisions
window.addEventListener('keydown',function(ev){
  if(!activeDecision)return;
  const key=ev.key.toUpperCase();
  const idx=activeDecision.options.findIndex(o=>o.key===key);
  if(idx>=0)pickDecision(idx);
});

// Helper: has this agent already sent a message with this key?
// Time-expiring: messages can re-trigger after cooldown (default 30 sim-seconds)
function hasSent(id,key,cooldown){
  const t=agents[id].sent[key];
  if(t===undefined||t===false)return false;
  if(t===true)return true; // permanent (one-time events like detection)
  // Time-based: check if cooldown expired
  return (simTime-t)<(cooldown||30);
}
function markSent(id,key,permanent){
  agents[id].sent[key]=permanent?true:simTime;
}
// Mark as permanently sent (one-time events)
function markSentPermanent(id,key){agents[id].sent[key]=true}

// Helper: read last inbox message from a specific sender
function lastFrom(id,fromId){
  const msgs=agents[id].inbox.filter(m=>m.from===fromId);
  return msgs.length?msgs[msgs.length-1]:null;
}

  struct_group(a,dt){

  // ── TACTICAL RESOURCES: Report status, do work ──
  engines(a,dt){
    a.tickInterval=10;
    if(!a.active)return;
    // Check ETA — can't operate until arrived
    if(a.state.enRoute&&simTime<a.state.eta){
      if(!hasSent('engines','enroute')){markSent('engines','enroute');agentSend('engines',agents.ops_chief.active?'ops_chief':'ic',`E51 STATUS: En route. ETA ${Math.ceil((a.state.eta-simTime)/60)} min.`,'intel')}
      return;
    }
    if(a.state.enRoute){a.state.enRoute=false;agentSend('engines',agents.ops_chief.active?'ops_chief':'ic',`E51+E52+E53 ON SCENE. Ready for assignment.`,'intel')}
    // Engines do direct attack — slowly increases containment
    FIRE.containment=Math.min(95,FIRE.containment+0.15);

    const reportTo=agents.div_alpha.active?'div_alpha':'ops_chief';
    if(simTime-a.state.lastReport>8){
      a.state.lastReport=simTime;
      const waterPct=Math.max(10,100-simTime*0.5);
      agentSend('engines',reportTo,`E51 PROGRESS: Direct attack holding flank. Water at ${Math.round(waterPct)}%. ${waterPct<30?'TENDER RESUPPLY NEEDED.':''}Fire behavior ${FIRE.intensity>6?'EXTREME':'moderate'} here.`,'intel');
      if(waterPct<30&&agents.tender.active){
        agentSend('engines','tender',`REQUEST: Water resupply needed. Tank at ${Math.round(waterPct)}%.`,'coord');
      }
      if(agents.safety.active&&FIRE.intensity>6)agentSend('engines','safety',`E51: Extreme heat on flank. Requesting safety check.`,'safety');
    }
  },

  hotshots(a,dt){
    a.tickInterval=10;
    if(!a.active)return;
    if(a.state.enRoute&&simTime<a.state.eta){
      if(!hasSent('hotshots','enroute')){markSent('hotshots','enroute');agentSend('hotshots','div_alpha',`IHC: En route. ETA ${Math.ceil((a.state.eta-simTime)/60)} min.`,'intel')}
      return;
    }
    if(a.state.enRoute){a.state.enRoute=false;showBanner('HOTSHOT CREW ON SCENE','IHC-1 (20 personnel) reporting for burnout operations');agentSend('hotshots','div_alpha',`IHC ON SCENE. 20 personnel. Ready for assignment.`,'intel')}
    FIRE.containment=Math.min(95,FIRE.containment+0.25); // hotshots are effective
    // Track actual work hours (NWCG: 16hr max, 2:1 work-rest ratio)
    if(!a.state.workStart)a.state.workStart=simTime;
    const workHrs=(simTime-a.state.workStart)/3600;
    const fatigue=workHrs>14?'MANDATORY REST (16hr limit)':workHrs>12?'Level 3 — ROTATION NEEDED':workHrs>8?'Level 2':'Level 1';
    if(simTime-a.state.lastReport>8){
      a.state.lastReport=simTime;
      agentSend('hotshots','div_alpha',`IHC REPORT: Burnout ${Math.min(100,Math.round((simTime-a.state.workStart)*0.3))}% complete. Work hours: ${workHrs.toFixed(1)}h. Fatigue: ${fatigue}. LCES ${FIRE.windShifted?'RECHECKED':'confirmed'}.`,'intel');
      if(agents.fire_branch.active)agentSend('hotshots','fire_branch',`IHC status: ${Math.min(100,Math.round((simTime-a.state.workStart)*0.3))}% burnout. ${fatigue}.`,'intel');
      // At 14h, escalate to IC for rotation
      if(workHrs>14&&!hasSent('hotshots','fatigue_alert')){
        markSent('hotshots','fatigue_alert');
        agentSend('hotshots','ic',`CREW FATIGUE CRITICAL: IHC at ${workHrs.toFixed(1)}h work. NWCG mandates rest at 16h. Rotation crew needed.`,'safety');
      }
    }
  },

// SIMULATION LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let particles=[];
let hoveredNode=null,hoveredEdge=null;

// Zoom/Pan state
let viewScale=1,viewX=0,viewY=0,isPanning=false,panStartX=0,panStartY=0;
canvas.addEventListener('wheel',function(ev){
  ev.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;
  // World coords under mouse before zoom
  const wx=(mx-viewX)/viewScale,wy=(my-viewY)/viewScale;
  const delta=ev.deltaY>0?0.9:1.1;
  viewScale=Math.max(0.3,Math.min(5,viewScale*delta));
  // Adjust pan so world point stays under mouse
  viewX=mx-wx*viewScale;viewY=my-wy*viewScale;
},{passive:false});
canvas.addEventListener('mousedown',function(ev){
  if(hoveredNode){/* dragging node, handled below */return}
  isPanning=true;panStartX=ev.clientX-viewX;panStartY=ev.clientY-viewY;
  canvas.style.cursor='grabbing';
});
canvas.addEventListener('mousemove',function(ev){
  if(isPanning&&!dragging){viewX=ev.clientX-panStartX;viewY=ev.clientY-panStartY}
});
canvas.addEventListener('mouseup',function(){isPanning=false;canvas.style.cursor='default'});
// Convert screen coords to world coords for hit-testing
function screen2world(sx,sy){return{x:(sx-viewX)/viewScale,y:(sy-viewY)/viewScale}}
function world2screen(wx,wy){return{x:wx*viewScale+viewX,y:wy*viewScale+viewY}}

// Activate external sensors + scouting drones — they're always on
function activateSensors(){
  ['alert_cam','satellite','raws','drones'].forEach(id=>{agents[id].active=true;litNodes.add(id)});
}

function formatSimTime(t){
  const m=Math.floor(t/60),s=Math.floor(t%60);
  return `T+${m}:${String(s).padStart(2,'0')}`;
}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('play-btn');
  if(playing){
    btn.textContent='PAUSE';btn.classList.add('playing');
    lastFrameTime=performance.now();
    if(simTime===0){
      // Fresh start
      litNodes=new Set();
      for(const id of Object.keys(agents)){initAgent(id)}
      icsPhase='standby';
      FIRE.reset();
      particles=[];
      msgEl.innerHTML='';
      activateSensors();
    }
  } else {
    btn.textContent='PLAY';btn.classList.remove('playing');
  }
}

function resetSim(){
  playing=false;simTime=0;icsPhase='standby';
  litNodes=new Set();
  for(const id of Object.keys(agents))initAgent(id);
  FIRE.reset();
  particles=[];msgEl.innerHTML='';
  document.getElementById('play-btn').textContent='PLAY';
  document.getElementById('play-btn').classList.remove('playing');
  document.getElementById('timeline-progress').style.width='0%';
  positions={};velocities={};
  const allIds=Object.keys(NODES);
  for(const id of allIds){
    const n=NODES[id];
    layoutNode(id,n,allIds);
  }
}

function setSpeed(v){
  simSpeed=parseFloat(v);
  document.getElementById('speed-label').textContent=simSpeed.toFixed(1)+'x';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LAYOUT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ── Fixed hierarchical layout — no physics simulation needed ──
// Positions are computed once based on ICS org chart structure.
// This eliminates the O(n²) force-directed simulation that caused lag.

function initLayout(){
  const cx=W/2,cy=H/2;

  // ── Tier Y positions (top to bottom: command → staff → branch → tactical → external) ──
  const Y_CMD    = cy - 340;
  const Y_STAFF  = cy - 190;
  const Y_BRANCH = cy - 20;
  const Y_TACT1  = cy + 120;  // tactical row 1 (group-level)
  const Y_TACT2  = cy + 210;  // tactical row 2 (individual units)
  const Y_TACT3  = cy + 290;  // tactical row 3 (individual drones)
  const Y_EXT    = cy + 380;
  const Y_AI     = cy - 100;  // right column

  // Helper: spread N items centered on cx
  function spread(n, spacing, centerX){
    centerX = centerX || cx;
    const arr = [];
    for(let i=0;i<n;i++) arr.push(centerX - (n-1)*spacing/2 + i*spacing);
    return arr;
  }

  // ── COMMAND ROW ──
  const cmdIds = ['ic'];
  const cmdStaffIds = ['safety','pio','liaison'];
  positions['ic'] = {x:cx, y:Y_CMD};
  const csX = spread(3, 90, cx);
  cmdStaffIds.forEach((id,i) => { positions[id] = {x:csX[i], y:Y_CMD+50}; });

  // ── GENERAL STAFF ROW ──
  const staffIds = ['ops_chief','plan_chief','log_chief','fin_chief'];
  const stX = spread(4, 160, cx);
  staffIds.forEach((id,i) => { positions[id] = {x:stX[i], y:Y_STAFF}; });

  // ── BRANCHES ROW ── (grouped under their parent)
  // Under Ops Chief
  const opsX = stX[0]; // ops_chief x
  positions['fire_branch'] = {x:opsX-80, y:Y_BRANCH};
  positions['air_ops'] = {x:opsX+80, y:Y_BRANCH};

  // Under Fire Branch
  const fbX = opsX-80;
  positions['div_alpha'] = {x:fbX-80, y:Y_BRANCH+55};
  positions['div_bravo'] = {x:fbX, y:Y_BRANCH+55};
  positions['struct_group'] = {x:fbX+80, y:Y_BRANCH+55};

  // Under Air Ops
  const aoX = opsX+80;
  positions['atgs'] = {x:aoX-40, y:Y_BRANCH+55};
  positions['drones'] = {x:aoX+50, y:Y_BRANCH+55};

  // Under Plan Chief
  const planX = stX[1];
  positions['sit_unit'] = {x:planX-55, y:Y_BRANCH};
  positions['fban'] = {x:planX, y:Y_BRANCH};
  positions['res_unit'] = {x:planX+55, y:Y_BRANCH};

  // Under Log Chief
  const logX = stX[2];
  positions['comms'] = {x:logX-40, y:Y_BRANCH};
  positions['medical'] = {x:logX+40, y:Y_BRANCH};

  // Law Enforcement (under liaison area)
  positions['le_branch'] = {x:cx+280, y:Y_BRANCH};
  positions['traffic'] = {x:cx+240, y:Y_BRANCH+55};
  positions['genasys'] = {x:cx+320, y:Y_BRANCH+55};

  // ── TACTICAL ROW 1 — group-level resources ──
  const tac1 = ['engines','hotshots','hand_crew','dozer','vlat','seat','lead_plane','heli','tender','struct_eng'];
  const t1X = spread(tac1.length, 85, cx-40);
  tac1.forEach((id,i) => { positions[id] = {x:t1X[i], y:Y_TACT1}; });

  // ── TACTICAL ROW 2 — individual named units ──
  const tac2 = ['eng_69a','eng_69b','eng_23','tender_71','heli_1','vlat_1','seat_1','lead_1','ihc_8','hc_2','hc_5','dozer_1','struct_19'];
  const t2X = spread(tac2.length, 70, cx-40);
  tac2.forEach((id,i) => { positions[id] = {x:t2X[i], y:Y_TACT2}; });

  // ── TACTICAL ROW 2b — drone type controllers ──
  const dCtrl = ['drone_scout','drone_mapper','drone_reaper','drone_relay','drone_safety','drone_ignis','drone_suppress'];
  const dcX = spread(dCtrl.length, 75, cx-40);
  dCtrl.forEach((id,i) => { positions[id] = {x:dcX[i], y:Y_TACT2+30}; });

  // ── TACTICAL ROW 3 — individual drones ──
  const dIndiv = [];
  for(let i=1;i<=24;i++) dIndiv.push('d_'+String(i).padStart(2,'0'));
  const d3X = spread(dIndiv.length, 42, cx-40);
  dIndiv.forEach((id,i) => { positions[id] = {x:d3X[i], y:Y_TACT3}; });

  // ── EXTERNAL ROW ──
  const extIds = ['raws','satellite','alert_cam','dispatch','iroc','firis','nws'];
  const eX = spread(extIds.length, 100, cx);
  extIds.forEach((id,i) => { positions[id] = {x:eX[i], y:Y_EXT}; });

  // ── AI COLUMN (right side) ──
  const aiIds = ['ai_overwatch','ai_predict','ai_swarm','ai_evac','ai_deploy'];
  const aiX = cx + 440;
  const aiSpacing = 55;
  const aiStartY = Y_AI;
  aiIds.forEach((id,i) => { positions[id] = {x:aiX, y:aiStartY+i*aiSpacing}; });

  // Init velocities (unused now, but keep for drag compatibility)
  for(const id of Object.keys(NODES)){
    if(!positions[id]) positions[id] = {x:cx+(Math.random()-.5)*200, y:cy+(Math.random()-.5)*200};
    velocities[id] = {x:0, y:0};
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PARTICLES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TYPE_COLORS={command:'#FBBF24',intel:'#22D3EE',coord:'#34D399',ai:'#F472B6',safety:'#EF4444'};
const MAX_PARTICLES=50; // hard cap to prevent lag
function spawnMsgParticle(from,to,type){
  if(particles.length>=MAX_PARTICLES)return; // drop if too many
  particles.push({from,to,progress:0,speed:0.025,
    color:TYPE_COLORS[type]||'#94A3B8',size:2+Math.random()*1});
}

// ━━ STRUCTURAL ICS HIERARCHY EDGES (always drawn, dimmed when inactive) ━━
const ICS_HIERARCHY=[
  // Command → Staff

  // Individual drones → type parents
  ['drone_scout','d_01'],['drone_scout','d_02'],['drone_scout','d_03'],['drone_scout','d_07'],
  ['drone_scout','d_14'],['drone_scout','d_21'],['drone_scout','d_24'],
  ['drone_mapper','d_04'],['drone_mapper','d_08'],['drone_mapper','d_09'],
  ['drone_relay','d_05'],['drone_relay','d_13'],['drone_relay','d_22'],
  ['drone_reaper','d_06'],
  ['drone_safety','d_10'],['drone_safety','d_11'],['drone_safety','d_12'],['drone_safety','d_15'],
  ['drone_ignis','d_16'],['drone_ignis','d_17'],['drone_ignis','d_18'],['drone_ignis','d_19'],
  ['drone_suppress','d_20'],['drone_suppress','d_23'],
  // Plan → units
  ['plan_chief','sit_unit'],['plan_chief','fban'],['plan_chief','res_unit'],

  ['log_chief','comms'],['log_chief','medical'],

  ['engines','eng_69a'],['engines','eng_69b'],['engines','eng_23'],

  ['lead_plane','lead_1'],['hotshots','ihc_8'],['hand_crew','hc_2'],['hand_crew','hc_5'],
  ['dozer','dozer_1'],['struct_eng','struct_19'],

  ['dispatch','engines'],['dispatch','heli'],['dispatch','tender'],

  // Law enforcement
  ['le_branch','traffic'],['le_branch','genasys'],
  // AI agents → their domains
  ['ai_overwatch','ai_predict'],['ai_overwatch','ai_swarm'],['ai_overwatch','ai_evac'],['ai_overwatch','ai_deploy'],
  ['ai_swarm','drones'],['ai_deploy','ops_chief'],['ai_evac','le_branch'],['ai_predict','fban'],
  // IROC/NWS
  ['iroc','log_chief'],['nws','fban'],['firis','sit_unit'],
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function draw(){
  const now=performance.now();
  // Throttle to ~30fps to reduce CPU usage
  if(now-lastFrameTime<30){requestAnimationFrame(draw);return;}
  frame++;
  if(playing){
    const dt=(now-lastFrameTime)/1000*simSpeed;
    simTime+=dt;
    // ── Continuous information flow: scale with fire intensity ──
    // Spawn rate: every 60 frames when quiet, every 30 when active, every 20 in crisis
    const spawnRate=icsPhase==='crisis'||icsPhase==='full'?30:FIRE.area>10?45:90;
    if(FIRE.area>0&&litNodes.size>3&&frame%spawnRate===0&&particles.length<MAX_PARTICLES){
      // Pick a random subset of active edges (max 6)
      const activeEdges=ICS_HIERARCHY.filter(([a,b])=>litNodes.has(a)&&litNodes.has(b));
      const pick=Math.min(6,activeEdges.length);
      for(let k=0;k<pick;k++){
        const [parent,child]=activeEdges[Math.floor(Math.random()*activeEdges.length)];
        const isAI=NODES[parent]?.tier==='ai'||NODES[child]?.tier==='ai';
        const isSafety=parent==='safety'||child==='safety';
        if(Math.random()<0.5){
          // Downward: commands/orders from parent to child
          spawnMsgParticle(parent,child,isAI?'ai':isSafety?'safety':'command');
        } else {
          // Upward: intel/sitreps from child to parent
          spawnMsgParticle(child,parent,isAI?'ai':isSafety?'safety':'intel');
        }
      }
    }

    if(!externalMode){
      // Standalone mode: run internal fire simulation
      FIRE.tick(dt,simTime);
    }
    // Agent ticks run in BOTH modes — external mode gets fire data via postMessage,
    // but agents still need to generate messages and spawn particles
    for(const[id,a] of Object.entries(agents)){
      if(!a.active)continue;
      a.cooldown-=dt;
      if(a.cooldown<=0){
        a.cooldown=a.tickInterval;
        if(AGENT_TICK[id])AGENT_TICK[id](a,dt);
      }
    }
    // IC Decision system — check triggers every 60 frames, update timer every frame
    if(frame%60===0)checkDecisionTriggers();
    updateDecisionTimer();
  }
  lastFrameTime=now;

  ctx.fillStyle='#0A0E17';ctx.fillRect(0,0,W,H);
  // No physics simulation — fixed hierarchical layout

  // Apply zoom/pan transform
  ctx.save();
  ctx.translate(viewX,viewY);
  ctx.scale(viewScale,viewScale);

  const simStarted=simTime>0;

  // (Fire perimeter mini-map removed — situation map is in parent view)

  // Collect active edges (cached, updated every 10 frames)
  if(frame%10===0||!draw._edgeCache){
    draw._edgeCache=new Set();
    for(const[id,a] of Object.entries(agents)){
      if(!a.active)continue;
      for(const m of a.inbox){
        if(litNodes.has(m.from)&&litNodes.has(id)){
          draw._edgeCache.add(m.from+'→'+id);
        }
      }
    }
  }
  const activeEdgeSet=draw._edgeCache;

  // Draw structural hierarchy edges (always visible, very faint when inactive)
  for(const[from,to] of ICS_HIERARCHY){
    const a=positions[from],b=positions[to];
    if(!a||!b)continue;
    const bothActive=litNodes.has(from)&&litNodes.has(to);
    const isMessageEdge=activeEdgeSet.has(from+'→'+to)||activeEdgeSet.has(to+'→'+from);
    if(isMessageEdge)continue; // drawn below with color
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=bothActive?'rgba(100,120,150,0.15)':'rgba(30,38,54,0.12)';
    ctx.lineWidth=0.5;ctx.stroke();
  }

  // Draw active message edges (faint colored lines — no shadow for perf)
  for(const key of activeEdgeSet){
    const[from,to]=key.split('→');
    const a=positions[from],b=positions[to];
    if(!a||!b)continue;
    const lastMsg=agents[to]?.inbox.find(m=>m.from===from);
    const tc=TYPE_COLORS[lastMsg?.type]||'#1E2636';
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=tc+'30';ctx.lineWidth=0.8;ctx.stroke();
  }

  // Draw particles (batch by color to reduce state changes)
  {
    let alive=0;
    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      p.progress+=p.speed;
      if(p.progress>=1)continue;
      const a=positions[p.from],b=positions[p.to];
      if(!a||!b)continue;
      const x=a.x+(b.x-a.x)*p.progress,y=a.y+(b.y-a.y)*p.progress;
      const alpha=p.progress<0.15?p.progress/0.15:p.progress>0.85?(1-p.progress)/0.15:1;
      ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color+Math.round(alpha*200).toString(16).padStart(2,'0');
      ctx.fill();
      particles[alive++]=p; // compact in-place
    }
    particles.length=alive;
  }

  // ── Shape helpers matching TerrainScene map shapes ──
  // Determine shape from node tier + id
  const DRONE_CTRL_IDS=new Set(['drones','drone_scout','drone_mapper','drone_reaper','drone_relay','drone_safety','drone_ignis','drone_suppress']);
  const GROUP_IDS=new Set(['engines','hotshots','hand_crew','dozer','vlat','seat','lead_plane','heli','tender','struct_eng']);
  function nodeShape(id,n){
    if(n.tier==='ai') return 'hexagon';
    if(n.tier==='external') return 'diamond';
    if(id==='atgs') return 'airborne';
    if(DRONE_CTRL_IDS.has(id)||id.startsWith('d_')) return 'triangle';
    if(GROUP_IDS.has(id)) return 'circle';
    if(n.tier==='command'||n.tier==='staff'||n.tier==='branch') return 'square';
    // Individual units (eng_*, ihc_*, hc_*, etc.) → circle
    if(n.tier==='tactical') return 'circle';
    return 'circle';
  }

  function drawNodeShape(shape,x,y,r,fillStyle,strokeStyle,lw){
    ctx.beginPath();
    if(shape==='hexagon'){
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2-Math.PI/2;
        i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
      }
      ctx.closePath();
    } else if(shape==='diamond'){
      ctx.moveTo(x,y-r);ctx.lineTo(x+r,y);ctx.lineTo(x,y+r);ctx.lineTo(x-r,y);ctx.closePath();
    } else if(shape==='triangle'){
      ctx.moveTo(x,y-r);ctx.lineTo(x+r,y+r*0.6);ctx.lineTo(x-r,y+r*0.6);ctx.closePath();
    } else if(shape==='square'){
      const h=r*0.85;
      ctx.rect(x-h,y-h,h*2,h*2);
    } else if(shape==='airborne'){
      // Circle base + cross wings
      ctx.arc(x,y,r,0,Math.PI*2);
    } else {
      // circle (default for groups + individual units)
      ctx.arc(x,y,r,0,Math.PI*2);
    }
    ctx.fillStyle=fillStyle;ctx.fill();
    ctx.strokeStyle=strokeStyle;ctx.lineWidth=lw;ctx.stroke();
  }

  // Draw nodes
  for(const id of Object.keys(NODES)){
    const n=NODES[id],pos=positions[id];
    if(!n||!pos)continue;
    const isHovered=hoveredNode===id||externalHighlight===id;
    const isLit=litNodes.has(id);
    const r=n.size*(isHovered?1.3:1);
    const shape=nodeShape(id,n);
    // External highlight ring (from map hover)
    if(externalHighlight===id){
      ctx.beginPath();ctx.arc(pos.x,pos.y,r+6,0,Math.PI*2);
      ctx.strokeStyle='#FBBF24';ctx.lineWidth=2;ctx.stroke();
    }

    if(isLit){
      // Active node: shaped fill + stroke
      drawNodeShape(shape,pos.x,pos.y,r,
        n.color+(isHovered?'35':'18'),
        n.color+(isHovered?'CC':'66'),
        isHovered?1.5:0.8);
      // AI outer ring
      if(n.tier==='ai'){
        ctx.setLineDash([2,2]);ctx.beginPath();ctx.arc(pos.x,pos.y,r+3,0,Math.PI*2);
        ctx.strokeStyle=n.color+'30';ctx.lineWidth=0.5;ctx.stroke();ctx.setLineDash([]);
      }
      // Airborne cross wings
      if(shape==='airborne'){
        const orbitAng=frame*0.008;
        ctx.save();ctx.translate(pos.x,pos.y);ctx.rotate(orbitAng);
        ctx.strokeStyle=n.color+(isHovered?'AA':'50');ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(-r*1.3,0);ctx.lineTo(r*1.3,0);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,-r*0.5);ctx.lineTo(0,r*0.5);ctx.stroke();
        ctx.restore();
      }
      // Group inner dot
      if(shape==='circle'&&GROUP_IDS.has(id)){
        ctx.beginPath();ctx.arc(pos.x,pos.y,3,0,Math.PI*2);
        ctx.fillStyle=n.color+(isHovered?'FF':'90');ctx.fill();
      }
      // Diamond sensor pulse ring
      if(shape==='diamond'&&FIRE.area>0){
        const sp=0.3+Math.sin(frame*0.03)*0.2;
        ctx.beginPath();ctx.arc(pos.x,pos.y,r+5,0,Math.PI*2);
        ctx.strokeStyle=n.color+Math.round(sp*60).toString(16).padStart(2,'0');
        ctx.lineWidth=0.5;ctx.setLineDash([2,2]);ctx.stroke();ctx.setLineDash([]);
      }
      ctx.fillStyle=isHovered?'#FFFFFF':n.color;
      ctx.font=`${isHovered?'bold ':''}${r<14?7:9}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.short,pos.x,pos.y);
      if(isHovered||r>=22){
        ctx.fillStyle='#4A5568';ctx.font='6px -apple-system,sans-serif';
        ctx.fillText(n.label.length>25?n.label.substring(0,22)+'...':n.label,pos.x,pos.y+r+8);
      }
    } else {
      // Inactive node: greyed out, dim — same shape but faded
      drawNodeShape(shape,pos.x,pos.y,r*0.6,
        'rgba(20,26,40,0.3)',
        'rgba(40,50,70,0.25)',
        0.4);
      ctx.fillStyle='rgba(55,65,85,0.5)';
      ctx.font=`${r<14?6:7}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(n.short,pos.x,pos.y);
    }
  }

  // Tier labels (positions match fixed layout)
  const cx=W/2;
  ctx.fillStyle='rgba(30,38,54,0.5)';ctx.font='bold 8px -apple-system,sans-serif';ctx.textAlign='left';
  const tierLabels={command:'COMMAND',staff:'GENERAL STAFF',branch:'BRANCHES / DIVISIONS',tactical:'TACTICAL RESOURCES',external:'EXTERNAL SYSTEMS',ai:'AI AGENTS'};
  const tierY2={command:H/2-340,staff:H/2-190,branch:H/2-20,tactical:H/2+120,external:H/2+380,ai:H/2-100};
  for(const[t,label]of Object.entries(tierLabels)){
    const y=tierY2[t]-12;
    if(t==='ai'){
      ctx.fillText(label,cx+400,y);
      ctx.setLineDash([4,6]);ctx.beginPath();ctx.moveTo(cx+390,tierY2.command-20);
      ctx.lineTo(cx+390,tierY2.external+30);ctx.strokeStyle='#F472B620';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
    } else ctx.fillText(label,30,y);
  }

  // Restore from zoom/pan transform (UI elements drawn in screen space)
  ctx.restore();

  // Update stats
  if(frame%20===0){
    document.getElementById('s-time').textContent=formatSimTime(simTime);
    document.getElementById('s-acres').textContent=Math.round(FIRE.area*10)/10;
    document.getElementById('s-ros').textContent=Math.round(FIRE.ros);
    document.getElementById('s-contain').textContent=Math.round(FIRE.containment)+'%';
    document.getElementById('s-nodes').textContent=litNodes.size;
    document.getElementById('s-edges').textContent=activeEdgeSet.size;
    document.getElementById('s-scenario').textContent=
      icsPhase==='standby'?'Standby':icsPhase==='initial'?'Initial Attack':icsPhase==='extended'?'Extended Attack':icsPhase==='crisis'?'Crisis / Type 1':'Full ICS';
    document.getElementById('s-type').textContent=
      icsPhase==='standby'?'--':icsPhase==='initial'?'Type 4':icsPhase==='extended'?'Type 3':icsPhase==='crisis'?'Type 2':'Type 1';
    const wdNames=['N','NE','E','SE','S','SW','W','NW'];
    const wd=wdNames[Math.round(FIRE.getWindDir(simTime)/45)%8];
    document.getElementById('s-wind').textContent=`${wd} ${Math.round(FIRE.getWindSpeed(simTime))}mph`;
    document.getElementById('s-struct').textContent=FIRE.threatenedStructures;
    document.getElementById('timeline-progress').style.width=Math.min(100,simTime/300*100)+'%';
  }

  requestAnimationFrame(draw);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INTERACTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let _lastHoverTime=0,_lastHoverId=null;
const _nodeIds=Object.keys(NODES);
canvas.addEventListener('mousemove',function(e){
  const now=performance.now();
  if(now-_lastHoverTime<50)return; // throttle to 20Hz
  _lastHoverTime=now;
  const smx=e.clientX,smy=e.clientY;
  const wm=screen2world(smx,smy);
  hoveredNode=null;
  for(const id of _nodeIds){
    const pos=positions[id];if(!pos)continue;
    if(Math.hypot(pos.x-wm.x,pos.y-wm.y)<(NODES[id].size+8)/viewScale*1.2){hoveredNode=id;break}
  }
  try{window.parent.postMessage({type:'ics_hover',nodeId:hoveredNode},'*')}catch(e){}
  if(hoveredNode){
    // Only rebuild tooltip HTML when hovered node changes
    if(_lastHoverId!==hoveredNode){
      _lastHoverId=hoveredNode;
      const n=NODES[hoveredNode],a=agents[hoveredNode];
      let html=`<div class="tt-title" style="color:${n.color}">${n.label}</div>`;
      html+=`<div class="tt-role">${n.role}</div>`;
      if(a.active){
        html+=`<div class="tt-section"><div class="tt-label">Status: ACTIVE</div></div>`;
        const incoming=a.inbox.slice(-5);
        if(incoming.length){
          html+=`<div class="tt-section"><div class="tt-label">Recent Messages (${a.inbox.length} total)</div>`;
          incoming.forEach(m=>{
            html+=`<div class="tt-flow" style="color:${NODES[m.from]?.color||'#94A3B8'}">← ${NODES[m.from]?.short}: ${m.msg.substring(0,80)}${m.msg.length>80?'...':''}</div>`;
          });
          html+=`</div>`;
        }
      } else {
        html+=`<div class="tt-section"><div class="tt-label">Status: INACTIVE</div><div class="tt-flow">Awaiting activation in ICS chain</div></div>`;
      }
      tooltip.innerHTML=html;
    }
    tooltip.style.display='block';
    tooltip.style.left=Math.min(smx+16,W-340)+'px';
    tooltip.style.top=Math.max(smy-10,4)+'px';
  } else {tooltip.style.display='none';_lastHoverId=null;}
});

let dragging=null,dragOff={x:0,y:0};
canvas.addEventListener('mousedown',e=>{
  if(hoveredNode){
    dragging=hoveredNode;
    dragOff.x=positions[hoveredNode].x-screen2world(e.clientX,e.clientY).x;
    dragOff.y=positions[hoveredNode].y-screen2world(e.clientX,e.clientY).y;
  }
});
canvas.addEventListener('mousemove',e=>{
  if(dragging&&positions[dragging]){
    const wm=screen2world(e.clientX,e.clientY);
    positions[dragging].x=wm.x+dragOff.x;positions[dragging].y=wm.y+dragOff.y;
    velocities[dragging].x=0;velocities[dragging].y=0;
  }
});
canvas.addEventListener('mouseup',()=>{dragging=null;isPanning=false;canvas.style.cursor='default'});

// ━━ EXTERNAL FIRE STATE (postMessage from parent FireSight app) ━━
let externalMode=false; // true when driven by parent app's fire data
window.addEventListener('message',function(ev){
  if(!ev.data||ev.data.type!=='firesight_fire_state')return;
  const d=ev.data;

  // Reset when fire cleared (parent sends fireDetected=false after post-fire)
  if(externalMode&&!d.fireDetected){
    externalMode=false;
    litNodes=new Set();
    for(const id of Object.keys(agents))initAgent(id);
    icsPhase='standby';
    FIRE.reset();
    particles=[];
    return;
  }

  // First time receiving fire detected: auto-start the sim in external mode
  if(!externalMode&&d.fireDetected){
    externalMode=true;
    // Reset and start in external mode
    litNodes=new Set();
    for(const id of Object.keys(agents))initAgent(id);
    icsPhase='standby';
    FIRE.reset();
    particles=[];
    msgEl.innerHTML='';
    playing=true;
    lastFrameTime=performance.now();
    document.getElementById('play-btn').textContent='PAUSE';
    document.getElementById('play-btn').classList.add('playing');
    // Always-on sensors (scouting drones and external sensors)
    activateSensors();
  }

  // Sync fire state from map view
  if(d.fireDetected){
    // Override FIRE physics with real data from the map
    if(d.area>0)FIRE.area=d.area;
    if(d.ros>0)FIRE.ros=d.ros;
    if(d.intensity>0)FIRE.intensity=d.intensity;
    if(d.containment!==undefined)FIRE.containment=d.containment;
    if(d.windSpeed!==undefined){FIRE.wind.speed=d.windSpeed;FIRE.wind.gustSpeed=d.windSpeed*1.4}
    if(d.windDirection!==undefined)FIRE.wind.dir=d.windDirection;
    if(d.threatenedStructures!==undefined)FIRE.threatenedStructures=d.threatenedStructures;
    if(d.spots)FIRE.spots=d.spots;
    if(d.windShifted!==undefined)FIRE.windShifted=d.windShifted;

    // Seed the fire perimeter if empty (so agents can detect it)
    if(FIRE.perimeter.length===0&&FIRE.area>0){
      for(let i=0;i<16;i++){
        const a=i/16*Math.PI*2;
        FIRE.perimeter.push({x:FIRE.origin.x+Math.cos(a)*0.005,y:FIRE.origin.y+Math.sin(a)*0.005});
      }
    }

    // Sync ICS phase from map
    if(d.icsPhase){
      const phaseMap={standby:'standby',initial:'initial',extended:'extended',crisis:'crisis',full:'full'};
      if(phaseMap[d.icsPhase])icsPhase=phaseMap[d.icsPhase];
    }

    // ━━ SYNC ACTIVE NODES from map view ━━
    // Light up nodes that correspond to actually deployed units/drones on the map
    const allSynced=[...(d.activeUnits||[]),...(d.activeDrones||[]),...(d.activeAI||[])];
    for(const nodeId of allSynced){
      if(NODES[nodeId]&&!agents[nodeId].active){
        agents[nodeId].active=true;
        litNodes.add(nodeId);
        // Spawn particles along hierarchy edges to show activation flow
        for(const [a,b] of ICS_HIERARCHY){
          if(b===nodeId&&litNodes.has(a))spawnMsgParticle(a,b,'command');
          if(a===nodeId&&litNodes.has(b))spawnMsgParticle(a,b,'intel');
        }
      }
    }
    // Also activate structural ICS nodes based on phase
    if(d.icsPhase==='initial'||d.icsPhase==='extended'||d.icsPhase==='crisis'||d.icsPhase==='full'){
      ['ic','safety','dispatch'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }
    if(d.icsPhase==='extended'||d.icsPhase==='crisis'||d.icsPhase==='full'){
      ['ops_chief','plan_chief','fire_branch','air_ops','div_alpha','fban','sit_unit','atgs'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }
    if(d.icsPhase==='crisis'||d.icsPhase==='full'){
      ['pio','le_branch','struct_group','div_bravo','genasys','traffic'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }
    if(d.icsPhase==='full'){
      ['log_chief','fin_chief','iroc','comms','medical','liaison','res_unit','nws'].forEach(id=>{if(NODES[id]&&!agents[id].active){agents[id].active=true;litNodes.add(id)}});
    }

    // In external mode, extra ambient particle flow (light — agents handle the rest)
    if(externalMode&&frame%45===0&&particles.length<MAX_PARTICLES){
      const activeEdges=ICS_HIERARCHY.filter(([a,b])=>litNodes.has(a)&&litNodes.has(b));
      const pick=Math.min(4,activeEdges.length);
      for(let k=0;k<pick;k++){
        const [parent,child]=activeEdges[Math.floor(Math.random()*activeEdges.length)];
        const isAI=NODES[parent]?.tier==='ai'||NODES[child]?.tier==='ai';
        if(Math.random()<0.5) spawnMsgParticle(parent,child,isAI?'ai':'command');
        else spawnMsgParticle(child,parent,isAI?'ai':'intel');
      }
    }
  }
});

// Auto-play after 1 second if in standalone mode
setTimeout(() => {
  if (!playing && !externalMode) {
    togglePlay();
  }
}, 1000);

// ━━ INIT ━━
initLayout();
draw();
</script>
</body>
</html>
